<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixels Connect - Site Assignment Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #f0a500;
    --accent2: #e05c2a;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #a855f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  header h1 span { color: var(--text); }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #date-display {
    font-size: 0.85rem;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
  }

  /* Top controls */
  .controls-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control-group label {
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  input[type="date"], input[type="text"], textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="date"]:focus, input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 70px;
    width: 100%;
  }

  .notes-group {
    flex: 1;
    min-width: 260px;
  }

  /* Main layout */
  .main {
    padding: 28px 32px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
  }

  /* Grid */
  .sites-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  /* Site card */
  .site-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .site-card:hover {
    border-color: #484f58;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .site-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  .site-name-input {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 0;
    cursor: text;
  }

  .site-name-input:focus {
    border: none;
    outline: none;
    color: var(--accent);
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .count-badge {
    background: rgba(240,165,0,0.15);
    color: var(--accent);
    border: 1px solid rgba(240,165,0,0.3);
  }

  .site-card-body {
    padding: 16px 18px;
  }

  /* Sub-groups (shift labels) */
  .subgroup {
    margin-bottom: 10px;
  }

  .subgroup-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
    padding: 0 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .subgroup-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
  }

  /* Employee list */
  .employee-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 10px;
  }

  .employee-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: grab;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }

  .employee-item:hover {
    background: var(--surface2);
    border-color: #484f58;
  }

  .employee-item.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }

  .drag-handle {
    color: var(--text-muted);
    font-size: 0.75rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .emp-name {
    flex: 1;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text);
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }

  .remove-btn:hover {
    color: var(--red);
    background: rgba(248,81,73,0.12);
  }

  /* Add employee dropdown */
  .add-emp-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }

  .add-emp-row select {
    flex: 1;
    font-size: 0.85rem;
    padding: 7px 10px;
  }

  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .add-btn:hover { opacity: 0.85; }

  .add-btn.secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .add-btn.secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Add site */
  .add-site-card {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 160px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .add-site-card:hover {
    border-color: var(--accent);
    background: rgba(240,165,0,0.04);
  }

  .add-site-card span {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .add-site-card:hover span { color: var(--accent); }

  /* Delete site */
  .delete-site-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }

  .delete-site-btn:hover {
    color: var(--red);
    background: rgba(248,81,73,0.12);
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 10px 24px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 24px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* Summary panel */
  .summary-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-top: 28px;
  }

  .summary-panel h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .summary-content {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 0.82rem;
    color: var(--text-muted);
    white-space: pre-wrap;
    line-height: 1.7;
    display: none;
  }

  .summary-content.visible { display: block; }

  /* Unassigned */
  .unassigned-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    margin-bottom: 24px;
  }

  .unassigned-panel h3 {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .unassigned-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.78rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,165,0,0.08);
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }

  /* Shift label input */
  .shift-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 4px;
  }

  .shift-input {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    color: var(--text-muted);
    padding: 2px 4px;
    width: 140px;
    cursor: text;
  }

  .shift-input:focus {
    outline: none;
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .del-shift-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 2px 5px;
    border-radius: 4px;
  }

  .del-shift-btn:hover { color: var(--red); }

  .add-shift-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.15s;
  }

  .add-shift-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--green);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    padding: 12px 22px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }

  #toast.show { opacity: 1; transform: translateY(0); }

  /* Responsive */
  @media (max-width: 600px) {
    header, .controls-bar, .main { padding: 14px 16px; }
    .sites-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>⚡ Pixels Connect <span>Site Assign</span></h1>
  <div class="header-meta">
    <div id="date-display">Loading...</div>
  </div>
</header>

<div class="controls-bar">
  <div class="control-group">
    <label>Work Date</label>
    <input type="date" id="work-date">
  </div>
  <div class="control-group notes-group">
    <label>Notes</label>
    <textarea id="global-notes" placeholder="Add any general notes, instructions, or reminders..."></textarea>
  </div>
</div>

<div class="main">

  <div class="unassigned-panel" id="unassigned-panel">
    <h3>⬡ Unassigned Employees <span id="unassigned-count" class="badge count-badge">0</span></h3>
    <div class="unassigned-chips" id="unassigned-chips"></div>
  </div>

  <div class="section-header">
    <h2>Site Assignments</h2>
    <div class="actions">
      <button class="btn-secondary" onclick="resetToDefault()">↺ Reset Default</button>
      <button class="btn-primary" onclick="generateSummary()">📋 Generate Summary</button>
    </div>
  </div>

  <div class="sites-grid" id="sites-grid"></div>

  <div class="summary-panel" id="summary-panel">
    <h3>📄 Assignment Summary</h3>
    <pre class="summary-content" id="summary-content"></pre>
  </div>

</div>

<div id="toast">✓ Copied to clipboard!</div>

<script>
const ALL_EMPLOYEES = [
  "MIAH NAYON","SHAKIRUL","MIA HASAN","KHAN MD NURNABI","ALI MOHAMMAD TAHER",
  "AZIZ ABDUL","MIAH RASHED","ELIAS MD","RANA MOHAMMED SHOHEL","HOSSAIN AMZAD",
  "NAIM ANAMUL HOQ","HASSAN MD JAHID","MD HASAN ALI","MIA MD SOHAG","BASKARAN MANJARI",
  "ISLAM MD NAZRUL","ALOM MD SHAHIN","KYAW ZIN THANT","HOSSAIN MD EMON","KADIR ABDUL",
  "AHMMAD MOHAMMAD AKSAR","HOSSAIN JAHANGIR","HOSSAIN KABIR","RANA JEWEL",
  "HOSSEN MD ARMAN","HOSSAN YUSUF","BADSHA MD","MOGAN MUNIANDY","HOSSAIN MD RIPON",
  "HASAN MD MAHEDI","NI SOE OO","MYO MIN LATT","TUN MIN LATT","BO BO ZAW",
  "AUNG WAI PHYO","TUN TUN WIN","SI THU HTUN"
];

const DEFAULT_SITES = [
  {
    name: "Neythal Rd - MM",
    shifts: [
      { label: "", employees: ["RANA MOHAMMED SHOHEL","MD HASAN ALI"] }
    ]
  },
  {
    name: "Neythal Rd - Can",
    shifts: [
      { label: "", employees: ["ISLAM MD NAZRUL","HOSSEN MD ARMAN","HOSSAIN AMZAD","HASAN MD MAHEDI"] }
    ]
  },
  {
    name: "JP - Can",
    shifts: [
      { label: "", employees: ["NAIM ANAMUL HOQ","ALOM MD SHAHIN","KYAW ZIN THANT","BADSHA MD"] },
      { label: "Night Shift", employees: ["HOSSAIN JAHANGIR","HOSSAIN MD EMON"] }
    ]
  },
  {
    name: "Tuas - MM",
    shifts: [
      { label: "", employees: ["KADIR ABDUL","KHAN MD NURNABI","HASSAN MD JAHID","MIA MD SOHAG"] },
      { label: "Morning Shift", employees: ["HOSSAIN KABIR","MOGAN MUNIANDY"] }
    ]
  },
  {
    name: "Kaki Bukit - MM",
    shifts: [
      { label: "", employees: ["ALI MOHAMMAD TAHER","AHMMAD MOHAMMAD AKSAR","BASKARAN MANJARI"] }
    ]
  },
  {
    name: "Logos",
    shifts: [
      { label: "", employees: [
        "MIA HASAN","MIAH NAYON","SHAKIRUL","MIAH RASHED",
        "RANA JEWEL","HOSSAN YUSUF","HOSSAIN MD RIPON","NI SOE OO",
        "TUN MIN LATT","BO BO ZAW","AUNG WAI PHYO","TUN TUN WIN","SI THU HTUN"
      ] }
    ]
  },
  {
    name: "KWSH",
    shifts: [
      { label: "", employees: ["AZIZ ABDUL","MYO MIN LATT"] }
    ]
  }
];

let sites = [];
let dragSrc = null;

function initDate() {
  const today = new Date();
  const fmt = today.toISOString().split('T')[0];
  document.getElementById('work-date').value = fmt;
  updateDateDisplay();
}

function updateDateDisplay() {
  const v = document.getElementById('work-date').value;
  if (!v) return;
  const d = new Date(v + 'T00:00:00');
  document.getElementById('date-display').textContent =
    d.toLocaleDateString('en-SG', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

document.getElementById('work-date').addEventListener('change', updateDateDisplay);

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function resetToDefault() {
  sites = deepClone(DEFAULT_SITES);
  renderAll();
}

function getAssignedAll() {
  const set = new Set();
  sites.forEach(s => s.shifts.forEach(sh => sh.employees.forEach(e => set.add(e))));
  return set;
}

function renderUnassigned() {
  const assigned = getAssignedAll();
  const unassigned = ALL_EMPLOYEES.filter(e => !assigned.has(e));
  const count = unassigned.length;
  document.getElementById('unassigned-count').textContent = count;
  const panel = document.getElementById('unassigned-panel');
  const chips = document.getElementById('unassigned-chips');
  panel.style.display = count === 0 ? 'none' : 'block';
  chips.innerHTML = '';
  unassigned.forEach(emp => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = emp;
    chip.title = 'Click to assign to a site';
    chips.appendChild(chip);
  });
}

function renderAll() {
  renderSites();
  renderUnassigned();
  document.getElementById('summary-content').textContent = '';
  document.getElementById('summary-content').classList.remove('visible');
}

function renderSites() {
  const grid = document.getElementById('sites-grid');
  grid.innerHTML = '';
  sites.forEach((site, sIdx) => {
    grid.appendChild(createSiteCard(site, sIdx));
  });
  // Add new site button
  const addCard = document.createElement('div');
  addCard.className = 'add-site-card';
  addCard.innerHTML = '<span>＋ Add New Site</span>';
  addCard.onclick = () => {
    sites.push({ name: 'New Site', shifts: [{ label: '', employees: [] }] });
    renderAll();
  };
  grid.appendChild(addCard);
}

function createSiteCard(site, sIdx) {
  const card = document.createElement('div');
  card.className = 'site-card';

  const totalEmp = site.shifts.reduce((a,s) => a + s.employees.length, 0);

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'site-card-header';
  
  const nameInput = document.createElement('input');
  nameInput.className = 'site-name-input';
  nameInput.value = site.name;
  nameInput.title = 'Click to rename site';
  nameInput.onchange = () => { sites[sIdx].name = nameInput.value; renderUnassigned(); };

  const badge = document.createElement('span');
  badge.className = 'badge count-badge';
  badge.textContent = totalEmp + ' workers';

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-site-btn';
  delBtn.textContent = '🗑';
  delBtn.title = 'Delete site';
  delBtn.onclick = () => {
    if (confirm(`Delete site "${site.name}"?`)) {
      sites.splice(sIdx, 1);
      renderAll();
    }
  };

  hdr.appendChild(nameInput);
  hdr.appendChild(badge);
  hdr.appendChild(delBtn);

  const body = document.createElement('div');
  body.className = 'site-card-body';

  site.shifts.forEach((shift, shIdx) => {
    // Shift label
    const shiftRow = document.createElement('div');
    shiftRow.className = 'shift-row';
    
    const shiftInput = document.createElement('input');
    shiftInput.className = 'shift-input';
    shiftInput.value = shift.label;
    shiftInput.placeholder = 'Shift label (optional)';
    shiftInput.title = 'Edit shift label';
    shiftInput.onchange = () => { sites[sIdx].shifts[shIdx].label = shiftInput.value; };

    if (shIdx > 0) {
      const div = document.createElement('div');
      div.className = 'divider';
      body.appendChild(div);

      const delShift = document.createElement('button');
      delShift.className = 'del-shift-btn';
      delShift.textContent = '✕';
      delShift.title = 'Remove this shift';
      delShift.onclick = () => {
        sites[sIdx].shifts.splice(shIdx, 1);
        renderAll();
      };
      shiftRow.appendChild(shiftInput);
      shiftRow.appendChild(delShift);
    } else {
      shiftRow.appendChild(shiftInput);
    }
    body.appendChild(shiftRow);

    // Employee list
    const empList = document.createElement('div');
    empList.className = 'employee-list';
    empList.dataset.siteIdx = sIdx;
    empList.dataset.shiftIdx = shIdx;

    shift.employees.forEach((emp, eIdx) => {
      empList.appendChild(createEmpItem(emp, sIdx, shIdx, eIdx));
    });

    // Drop zone events
    empList.addEventListener('dragover', e => {
      e.preventDefault();
      empList.style.background = 'rgba(240,165,0,0.06)';
    });
    empList.addEventListener('dragleave', () => {
      empList.style.background = '';
    });
    empList.addEventListener('drop', e => {
      e.preventDefault();
      empList.style.background = '';
      if (!dragSrc) return;
      const { emp, fromSite, fromShift, fromEmp } = dragSrc;
      const toSite = parseInt(empList.dataset.siteIdx);
      const toShift = parseInt(empList.dataset.shiftIdx);
      if (fromSite === toSite && fromShift === toShift) return;
      // Move employee
      sites[fromSite].shifts[fromShift].employees.splice(fromEmp, 1);
      sites[toSite].shifts[toShift].employees.push(emp);
      dragSrc = null;
      renderAll();
    });

    body.appendChild(empList);

    // Add employee row
    const addRow = document.createElement('div');
    addRow.className = 'add-emp-row';
    const sel = document.createElement('select');
    sel.innerHTML = '<option value="">+ Add employee...</option>';
    // Only show employees not assigned anywhere across all sites
    const assignedAnywhere = getAssignedAll();
    const available = ALL_EMPLOYEES.filter(emp => !assignedAnywhere.has(emp));
    if (available.length === 0) {
      const opt = document.createElement('option');
      opt.disabled = true;
      opt.textContent = '— All employees assigned —';
      sel.appendChild(opt);
    } else {
      available.forEach(emp => {
        const opt = document.createElement('option');
        opt.value = emp;
        opt.textContent = emp;
        sel.appendChild(opt);
      });
    }
    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = 'Add';
    addBtn.onclick = () => {
      const val = sel.value;
      if (!val) return;
      // Remove from any other site/shift first
      sites.forEach((s, si) => s.shifts.forEach((sh, shi) => {
        const i = sh.employees.indexOf(val);
        if (i !== -1) sh.employees.splice(i, 1);
      }));
      sites[sIdx].shifts[shIdx].employees.push(val);
      renderAll();
    };
    addRow.appendChild(sel);
    addRow.appendChild(addBtn);
    body.appendChild(addRow);
  });

  // Add shift button
  const addShiftBtn = document.createElement('button');
  addShiftBtn.className = 'add-shift-btn';
  addShiftBtn.textContent = '+ Add Shift Group';
  addShiftBtn.onclick = () => {
    sites[sIdx].shifts.push({ label: '', employees: [] });
    renderAll();
  };
  body.appendChild(addShiftBtn);

  card.appendChild(hdr);
  card.appendChild(body);
  return card;
}

function createEmpItem(emp, sIdx, shIdx, eIdx) {
  const item = document.createElement('div');
  item.className = 'employee-item';
  item.draggable = true;

  item.addEventListener('dragstart', () => {
    item.classList.add('dragging');
    dragSrc = { emp, fromSite: sIdx, fromShift: shIdx, fromEmp: eIdx };
  });
  item.addEventListener('dragend', () => {
    item.classList.remove('dragging');
  });

  const handle = document.createElement('span');
  handle.className = 'drag-handle';
  handle.textContent = '⠿';

  const name = document.createElement('span');
  name.className = 'emp-name';
  name.textContent = emp;

  const rmBtn = document.createElement('button');
  rmBtn.className = 'remove-btn';
  rmBtn.textContent = '×';
  rmBtn.title = 'Remove from this site';
  rmBtn.onclick = () => {
    sites[sIdx].shifts[shIdx].employees.splice(eIdx, 1);
    renderAll();
  };

  item.appendChild(handle);
  item.appendChild(name);
  item.appendChild(rmBtn);
  return item;
}

function generateSummary() {
  const date = document.getElementById('work-date').value;
  const notes = document.getElementById('global-notes').value.trim();
  const d = date ? new Date(date + 'T00:00:00').toLocaleDateString('en-SG', {
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  }) : 'Date not set';

  let txt = `*WORK SCHEDULE*\n`;
  txt += `${'─'.repeat(30)}\n`;
  txt += `Schedule Date: _${d}_\n`;
  if (notes) txt += `Notes: _${notes}_\n`;
  txt += `${'─'.repeat(30)}\n\n`;

  sites.forEach(site => {
    txt += `📍 *${site.name.toUpperCase()}*\n`;
    site.shifts.forEach(sh => {
      if (sh.label) txt += `  [${sh.label}]\n`;
      sh.employees.forEach(emp => txt += `  • ${emp}\n`);
    });
    txt += '\n';
  });

  const assigned = getAssignedAll();
  const unassigned = ALL_EMPLOYEES.filter(e => !assigned.has(e));
  if (unassigned.length) {
    txt += `⚠️  UNASSIGNED (${unassigned.length})\n`;
    unassigned.forEach(e => txt += `  • ${e}\n`);
  }

  const el = document.getElementById('summary-content');
  el.textContent = txt;
  el.classList.add('visible');
  el.scrollIntoView({ behavior:'smooth', block:'start' });

  // Copy to clipboard
  navigator.clipboard.writeText(txt).then(() => showToast()).catch(() => {});
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
initDate();
resetToDefault();
</script>
