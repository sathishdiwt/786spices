<!DOCTYPE html>
<html>
<head>
<title>Transport Fee Tracker</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
.container{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,select,button{width:100%;padding:10px;margin-top:10px}
h2{text-align:center}
.report{margin-top:20px;background:#eee;padding:10px}
</style>
<script>
fetch(scriptURL, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(entry)
});
</script>
</head>
<body>

<div class="container">
<h2>Transport Fee Entry</h2>

<input type="date" id="date">
<select id="person">
<option value="Person 1">Miah Rashed</option>
<option value="Person 2">Aziz Abdul</option>
</select>

<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="saveData()">Save</button>

<h3>Monthly Report</h3>
<input type="month" id="month">
<button onclick="getReport()">Calculate</button>

<div class="report" id="report"></div>
</div>

<script>
const scriptURL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

let localData = [];

function saveData(){
  let date = document.getElementById("date").value;
  let person = document.getElementById("person").value;
  let amount = document.getElementById("amount").value;

  if(!date || !amount){
    alert("Fill all fields");
    return;
  }

  let entry = {date, person, amount};
  localData.push(entry);

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(entry)
  });

  alert("Saved!");
}

function getReport(){
  let month = document.getElementById("month").value;
  let total1 = 0, total2 = 0;

  localData.forEach(e => {
    if(e.date.startsWith(month)){
      if(e.person === "Person 1") total1 += Number(e.amount);
      if(e.person === "Person 2") total2 += Number(e.amount);
    }
  });

  document.getElementById("report").innerHTML = `
    Person 1 Total: $${total1} <br>
    Person 2 Total: $${total2}
  `;
}


fetch(scriptURL, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(entry)
})
.then(res => res.text())
.then(msg => alert(msg))
.catch(err => alert("Error: " + err));
</script>

</body>
</html>
