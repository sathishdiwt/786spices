<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>786 Spices — Daily Sales Report</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C8A55A;
  --gold2: #E2C97E;
  --gold3: #F5E6B8;
  --gold-dim: rgba(200,165,90,0.15);
  --dark: #0F0A04;
  --dark2: #1C1308;
  --dark3: #261A0A;
  --brown: #7C4A1A;
  --cream: #FBF6E9;
  --cream2: #F3EAD3;
  --text: #1E1106;
  --text2: #7A6040;
  --border: #DDC88A;
  --border2: rgba(200,165,90,0.25);
  --green: #1E6E4A;
  --green-bg: #EBF7F1;
  --red: #9B2B1F;
  --red-bg: #FCECEA;
  --blue: #1A4A8A;
  --wa: #25D366;
  --wa2: #128C7E;
  --shadow: 0 4px 24px rgba(60,30,0,0.10);
  --shadow2: 0 2px 10px rgba(60,30,0,0.07);
  --radius: 16px;
  --radius2: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C8A55A' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

/* ── HEADER ── */
.header {
  background: var(--dark);
  position: relative;
  overflow: hidden;
  padding: 0 0 0;
}
.header-bg {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent, transparent 20px,
    rgba(200,165,90,0.03) 20px, rgba(200,165,90,0.03) 21px
  );
}
.header-glow {
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(200,165,90,0.12) 0%, transparent 70%);
  top: -100px; left: 50%; transform: translateX(-50%);
  pointer-events: none;
}
.header-inner {
  position: relative; z-index: 1;
  padding: 24px 20px 18px;
  text-align: center;
}
.logo-ring {
  width: 64px; height: 64px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  background: rgba(200,165,90,0.08);
  position: relative;
}
.logo-ring::before {
  content: '';
  position: absolute; inset: -5px;
  border: 1px solid rgba(200,165,90,0.2);
  border-radius: 50%;
}
.logo-ring span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 700;
  color: var(--gold);
}
.header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 700;
  color: var(--gold2);
  letter-spacing: 0.02em;
}
.header-sub {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(200,165,90,0.5);
  margin-top: 2px;
}
.dt-bar {
  background: var(--dark2);
  border-top: 1px solid rgba(200,165,90,0.18);
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  padding: 10px 12px;
}
.dt-item { text-align: center; }
.dt-label { font-size: 9px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(200,165,90,0.45); }
.dt-val { font-size: 13px; font-weight: 600; color: var(--gold2); margin-top: 2px; font-family: 'Outfit', monospace; }

/* ── LAYOUT ── */
.main { max-width: 540px; margin: 0 auto; padding: 16px 12px 100px; }

/* ── CARD ── */
.card {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
}
.card-head {
  background: var(--dark);
  padding: 13px 18px;
  display: flex; align-items: center; gap: 10px;
}
.card-head h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px; font-weight: 600;
  color: var(--gold2); flex: 1;
}
.badge {
  background: rgba(200,165,90,0.18);
  color: var(--gold);
  font-size: 10px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  letter-spacing: 0.05em; white-space: nowrap;
}
.card-body { padding: 16px; }

/* ── SELECT ── */
.sel-wrap { position: relative; }
.sel-wrap select {
  width: 100%; padding: 14px 42px 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius2);
  font-family: 'Outfit', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--text);
  background: var(--cream);
  appearance: none; -webkit-appearance: none;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
}
.sel-wrap select:focus { outline: none; border-color: var(--gold); background: var(--gold3); }
.sel-wrap::after {
  content: '▾';
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--gold); font-size: 17px; pointer-events: none;
}

/* ── SECTION LABEL ── */
.sec-lbl {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gold);
  margin: 18px 0 11px;
  display: flex; align-items: center; gap: 10px;
}
.sec-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── BLOCK ── */
.blk {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 13px;
}
.blk-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 700;
  color: var(--brown);
  margin-bottom: 13px; padding-bottom: 9px;
  border-bottom: 1px dashed var(--border);
}

/* ── FIELD ROW ── */
.frow {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 10px;
}
.frow label {
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  width: 120px; flex-shrink: 0;
  letter-spacing: 0.01em;
}
.inp-wrap { flex: 1; position: relative; }
.inp-wrap .pfx {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--text2); font-size: 14px; font-weight: 500; pointer-events: none;
}
.inp-wrap input {
  width: 100%; padding: 11px 10px 11px 28px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--text); background: #fff;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.15s, background 0.15s;
}
.inp-wrap input:focus { outline: none; border-color: var(--gold); background: var(--gold3); }
.inp-wrap input.neg { border-color: #E5C9A0; background: #FFF7EC; color: var(--red); }
.inp-wrap input.neg:focus { border-color: var(--brown); }

/* ── TOTAL ROWS ── */
.trow {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 13px; border-radius: 9px;
  margin-top: 8px;
  background: var(--cream2); border: 1px solid var(--border);
}
.trow-lbl { font-size: 12px; font-weight: 500; color: var(--text2); }
.trow-val { font-size: 16px; font-weight: 700; color: var(--text); }
.trow.grand { background: var(--dark); border: none; margin-top: 11px; }
.trow.grand .trow-lbl { color: var(--gold); font-weight: 600; font-size: 13px; }
.trow.grand .trow-val { color: var(--gold2); font-size: 21px; }
.trow.day { background: linear-gradient(135deg, var(--brown) 0%, #3D1A05 100%); border: none; margin-top: 11px; }
.trow.day .trow-lbl { color: var(--gold3); font-weight: 600; font-size: 13px; }
.trow.day .trow-val { color: #FFE082; font-size: 21px; }
.trow.sub { background: #EEF6FF; border-color: #C5DAFF; margin-top: 8px; }
.trow.sub .trow-lbl { color: var(--blue); }
.trow.sub .trow-val { color: var(--blue); }

/* ── NOTES ── */
.notes-wrap textarea {
  width: 100%; min-height: 90px;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius2);
  font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 400;
  color: var(--text); background: var(--cream);
  resize: vertical; line-height: 1.6;
  transition: border-color 0.15s;
}
.notes-wrap textarea:focus { outline: none; border-color: var(--gold); background: var(--gold3); }
.notes-wrap textarea::placeholder { color: #bba880; }

/* ── BUTTONS ── */
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.btn-save {
  padding: 15px 10px;
  background: var(--dark);
  border: 2px solid var(--gold);
  border-radius: 12px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 700;
  color: var(--gold2); cursor: pointer;
  transition: all 0.15s; width: 100%;
}
.btn-save:active { transform: scale(0.97); background: var(--dark3); }
.btn-prev {
  padding: 15px 10px;
  background: var(--cream2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 600;
  color: var(--brown); cursor: pointer;
  transition: all 0.15s; width: 100%;
}
.btn-prev:active { background: var(--border); }

.share-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.share-row.hidden { display: none; }
.btn-copy {
  padding: 13px 8px; background: var(--cream2);
  border: 1.5px solid var(--border); border-radius: 12px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--brown); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.15s;
}
.btn-copy:active { background: var(--border); }
.btn-wa {
  padding: 13px 8px; background: var(--wa);
  border: none; border-radius: 12px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.15s;
}
.btn-wa:active { background: var(--wa2); }

/* ── PREVIEW BOX ── */
.pv-box {
  background: #f0faf5; border: 1.5px solid #a8d5bc;
  border-radius: 10px; padding: 13px;
  margin-top: 12px; font-size: 12.5px;
  color: #1a4a30; white-space: pre-wrap;
  line-height: 1.68; font-family: 'Courier New', monospace;
  display: none; word-break: break-word;
  max-height: 280px; overflow-y: auto;
}

/* ── SAVED REPORTS ── */
.saved-item {
  background: #fff; border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 14px;
  margin-bottom: 10px;
  transition: box-shadow 0.15s;
}
.saved-item:last-child { margin-bottom: 0; }
.saved-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.saved-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; font-weight: 700; color: var(--brown);
}
.saved-date { font-size: 11px; color: var(--text2); margin-top: 2px; }
.saved-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.saved-total { font-size: 19px; font-weight: 700; color: var(--green); }
.saved-acts { display: flex; gap: 5px; align-items: center; }
.saved-cp {
  background: var(--cream2); border: 1px solid var(--border);
  border-radius: 7px; padding: 6px 10px;
  font-size: 12px; font-weight: 600; color: var(--brown); cursor: pointer;
}
.saved-wa {
  background: var(--wa); border: none;
  border-radius: 7px; padding: 6px 9px;
  font-size: 12px; font-weight: 600; color: #fff; cursor: pointer;
  display: flex; align-items: center; gap: 3px;
}
.saved-del {
  background: none; border: none; cursor: pointer;
  color: #ccc; font-size: 18px; padding: 2px 4px; line-height: 1;
}
.saved-del:active { color: var(--red); }
.saved-note {
  font-size: 11.5px; color: var(--text2);
  margin-top: 8px; padding-top: 8px;
  border-top: 1px dashed var(--border);
  font-style: italic; line-height: 1.5;
}

.empty { text-align: center; padding: 30px 16px; color: var(--text2); font-size: 14px; }
.empty .ico { font-size: 32px; margin-bottom: 8px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--dark); color: var(--gold2);
  font-size: 14px; font-weight: 500;
  padding: 12px 24px; border-radius: 30px;
  border: 1px solid var(--gold);
  z-index: 9999; transition: transform 0.28s cubic-bezier(.175,.885,.32,1.275);
  white-space: nowrap; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 14px 0; opacity: 0.5; }

@media (max-width: 380px) {
  .frow label { width: 98px; font-size: 11px; }
  .inp-wrap input { font-size: 14px; }
  .header h1 { font-size: 20px; }
  .saved-total { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-bg"></div>
  <div class="header-glow"></div>
  <div class="header-inner">
    <div class="logo-ring"><span><a href="index.html" style="text-decoration:none; color:inherit;">786</a></span></div>
    <h1>786 Spices Group</h1>
    <div class="header-sub">Daily Sales Report System</div>
  </div>
  <div class="dt-bar">
    <div class="dt-item"><div class="dt-label">Date</div><div class="dt-val" id="ld">—</div></div>
    <div class="dt-item"><div class="dt-label">Time</div><div class="dt-val" id="lt">—</div></div>
    <div class="dt-item"><div class="dt-label">Day</div><div class="dt-val" id="lday">—</div></div>
  </div>
</div>

<div class="main">

  <!-- Shop Select -->
  <div class="card">
    <div class="card-head"><h2>Select Shop</h2></div>
    <div class="card-body">
      <div class="sel-wrap">
        <select id="shopSel" onchange="renderForm()">
          <option value="">— Choose a shop —</option>
          <option value="muri">2D Jalan Papan — Muri Shop</option>
          <option value="jp_morning">2D Jalan Papan — Canteen (Morning)</option>
          <option value="jp_night">2D Jalan Papan — Canteen (Night)</option>
          <option value="neythal_canteen">20 Neythal Road — Canteen</option>
          <option value="neythal_mm">20 Neythal Road — Mini Mart</option>
          <option value="tuas_mm">36 Tuas — Mini Mart</option>
          <option value="kaki_mm">18 Kaki Bukit — Mini Mart</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Dynamic Form -->
  <div id="formArea"></div>

  <!-- Saved Reports -->
  <div class="card">
    <div class="card-head">
      <h2>Saved Reports</h2>
      <span class="badge" id="saveCnt">0 entries</span>
    </div>
    <div class="card-body" id="saveList">
      <div class="empty"><div class="ico">📋</div>No reports saved yet.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function pad(x){ return String(x).padStart(2,'0'); }
function clock(){
  const n = new Date();
  document.getElementById('ld').textContent = `${pad(n.getDate())}/${pad(n.getMonth()+1)}/${n.getFullYear()}`;
  document.getElementById('lt').textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('lday').textContent = DAYS[n.getDay()];
}
clock(); setInterval(clock, 1000);

function fmt(n){ return '$' + (+n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function v(id){ return parseFloat(document.getElementById(id)?.value) || 0; }
function setEl(id, val){ const e = document.getElementById(id); if(e) e.textContent = fmt(val); }
function toast(msg){
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2300);
}

const NAMES = {
  muri: '2D Jalan Papan — Muri Shop',
  jp_morning: '2D Jalan Papan — Canteen (Morning)',
  jp_night: '2D Jalan Papan — Canteen (Night)',
  neythal_canteen: '20 Neythal Road — Canteen',
  neythal_mm: '20 Neythal Road — Mini Mart',
  tuas_mm: '36 Tuas — Mini Mart',
  kaki_mm: '18 Kaki Bukit — Mini Mart'
};
let shop = '';

// --- HTML Builders ---
function fld(id, lbl, cls){
  return `<div class="frow">
    <label for="${id}">${lbl}</label>
    <div class="inp-wrap"><span class="pfx">$</span>
      <input type="number" inputmode="decimal" id="${id}" min="0" step="0.01" placeholder="0.00"${cls ? ` class="${cls}"` : ''} oninput="calc()">
    </div>
  </div>`;
}
function trow(lbl, id, cls){
  return `<div class="trow${cls?' '+cls:''}"><span class="trow-lbl">${lbl}</span><span class="trow-val" id="${id}">$0.00</span></div>`;
}
function blkOpen(title){ return `<div class="blk"><div class="blk-title">${title}</div>`; }
function blkClose(){ return `</div>`; }

function posBlock(p, num){
  return blkOpen(`🖥️ POS ${num} Sales`) +
    fld(p+'_cash','CASH') + fld(p+'_nets','NETS') + fld(p+'_paynow','PayNow') +
    trow('Total Sales', p+'_total') +
    `<div class="sec-lbl">Adjustments</div>` +
    fld(p+'_short','Shortage','neg') + fld(p+'_extra','Extra') +
    fld(p+'_boss','Handover to Boss') +
    trow('Float Cash (Cash − Boss)', p+'_float') +
    trow('Total Sales POS '+num, p+'_net', 'sub') +
    blkClose();
}

function notesField(){
  return `<div class="sec-lbl">Notes / Remarks</div>
  <div class="notes-wrap">
    <textarea id="notes" placeholder="Enter any additional notes, remarks or messages here…" oninput="calc()"></textarea>
  </div>`;
}

function renderForm(){
  shop = document.getElementById('shopSel').value;
  const area = document.getElementById('formArea');
  if(!shop){ area.innerHTML = ''; return; }
  let inner = '';

  if(shop === 'muri'){
    inner = `
      <div class="sec-lbl">Sales Breakdown</div>
      ${fld('cash','CASH')}${fld('coins','COINS')}${fld('nets','NETS')}${fld('paynow','PayNow')}
      ${trow('Total Sales','ts')}
      <div class="sec-lbl">Expenses</div>
      ${fld('exp','Expenses','neg')}
      ${trow('Grand Total','gt','grand')}
      ${trow('Cash to Locker (Cash − Expenses)','ctl','sub')}
    `;
  }
  else if(shop === 'jp_morning'){
    inner = `
      ${blkOpen('🍽️ Canteen Sales')}
        ${fld('cc_cash','CASH')}${fld('cc_nets','NETS')}${fld('cc_paynow','PayNow')}
        ${trow('Total Sales — Canteen','cc_tot')}
        <div class="sec-lbl">Expenses</div>
        ${fld('cc_exp','Expenses','neg')}
        ${trow('Canteen Grand Total','cc_grand')}
      ${blkClose()}
      ${blkOpen('🛒 Small Shop Sales')}
        ${fld('ss_cash','CASH')}${fld('ss_nets','NETS')}${fld('ss_paynow','PayNow')}
        ${trow('Total Sales — Small Shop','ss_tot')}
        <div class="sec-lbl">Expenses</div>
        ${fld('ss_exp','Expenses','neg')}
        ${trow('Small Shop Grand Total','ss_grand')}
      ${blkClose()}
      ${trow('Total Morning Sales (Canteen + Small Shop)','morning_total','grand')}
    `;
  }
  else if(shop === 'jp_night'){
    inner = `
      ${blkOpen('🌙 Canteen Sales')}
        ${fld('jn_cc','CASH')}${fld('jn_cn','NETS')}${fld('jn_cp','PayNow')}
        ${trow('Total Canteen Sales','jn_ct')}
        <div class="sec-lbl">Expenses</div>
        ${fld('jn_ce','Expenses','neg')}
        ${trow('Canteen Grand Total','jn_cg')}
      ${blkClose()}
      ${blkOpen('🎪 Catering Sales')}
        ${fld('jn_kc','CASH')}${fld('jn_kn','NETS')}${fld('jn_kp','PayNow')}
        ${trow('Total Catering Sales','jn_kt')}
      ${blkClose()}
      ${trow('Grand Total (Canteen + Catering)','jn_grand','grand')}
    `;
  }
  else if(shop === 'neythal_canteen'){
    inner = `
      ${blkOpen('🍽️ Canteen Sales')}
        ${fld('nc_cc','CASH')}${fld('nc_cn','NETS')}${fld('nc_cp','PayNow')}
        ${trow('Total Canteen Sales','nc_ct')}
        <div class="sec-lbl">Expenses</div>
        ${fld('nc_ce','Expenses','neg')}
        ${trow('Canteen Grand Total','nc_cg')}
      ${blkClose()}
      ${blkOpen('🎪 Catering Sales')}
        ${fld('nc_kc','CASH')}${fld('nc_kn','NETS')}${fld('nc_kp','PayNow')}
        ${trow('Total Catering Sales','nc_kt')}
      ${blkClose()}
      ${trow('Grand Total (Canteen + Catering)','nc_grand','grand')}
    `;
  }
  else if(shop === 'neythal_mm'){
    inner = `
      <div class="sec-lbl">Sales Breakdown</div>
      ${fld('nm_cash','CASH')}${fld('nm_nets','NETS')}${fld('nm_paynow','PayNow')}
      ${trow('Total Sales','nm_ts')}
      <div class="sec-lbl">Adjustments</div>
      ${fld('nm_short','Shortage','neg')}${fld('nm_extra','Extra')}
      ${fld('nm_boss','Handover to Boss')}
      ${trow('Float Cash (Cash − Boss)','nm_float','sub')}
      ${fld('nm_supplier','Cash to Supplier','neg')}
      ${trow('Day Sales Total','nm_day','day')}
    `;
  }
  else if(shop === 'tuas_mm'){
    inner = posBlock('p1',1) + posBlock('p2',2) + posBlock('p3',3) +
      `<div class="sec-lbl">Summary</div>` +
      fld('tuas_supplier','Cash to Supplier','neg') +
      trow('Total Handover to Boss','tuas_boss_total','sub') +
      trow('Day Sales Total (POS 1+2+3)','day_tot','day');
  }
  else if(shop === 'kaki_mm'){
    inner = posBlock('p1',1) + posBlock('p2',2) +
      `<div class="sec-lbl">Summary</div>` +
      fld('kaki_supplier','Cash to Supplier','neg') +
      trow('Total Handover to Boss','kaki_boss_total','sub') +
      trow('Day Sales Total (POS 1+2)','day_tot','day');
  }

  inner += notesField();

  area.innerHTML = `<div class="card">
    <div class="card-head"><h2>${NAMES[shop]}</h2><span class="badge">Daily Entry</span></div>
    <div class="card-body">
      ${inner}
      <div class="btn-grid">
        <button class="btn-save" onclick="saveRpt()">💾 Save Report</button>
        <button class="btn-prev" onclick="togglePv()">👁 Preview & Share</button>
      </div>
      <div id="pvBox" class="pv-box"></div>
      <div class="share-row hidden" id="shareRow">
        <button class="btn-copy" onclick="copyRpt()">📋 Copy Text</button>
        <button class="btn-wa" onclick="waRpt()">${waIcon()} WhatsApp</button>
      </div>
    </div>
  </div>`;
  calc();
}

// --- Calc ---
function calc(){
  if(!shop) return;
  if(shop === 'muri'){
    const ts = v('cash')+v('coins')+v('nets')+v('paynow');
    const gt = ts - v('exp');
    setEl('ts', ts); setEl('gt', gt);
    setEl('ctl', v('cash') - v('exp'));
  }
  else if(shop === 'jp_morning'){
    const cct = v('cc_cash')+v('cc_nets')+v('cc_paynow');
    const ccg = cct - v('cc_exp');
    const sst = v('ss_cash')+v('ss_nets')+v('ss_paynow');
    const ssg = sst - v('ss_exp');
    setEl('cc_tot', cct); setEl('cc_grand', ccg);
    setEl('ss_tot', sst); setEl('ss_grand', ssg);
    setEl('morning_total', cct + sst);
  }
  else if(shop === 'jp_night'){
    const ct = v('jn_cc')+v('jn_cn')+v('jn_cp');
    const cg = ct - v('jn_ce');
    const kt = v('jn_kc')+v('jn_kn')+v('jn_kp');
    setEl('jn_ct', ct); setEl('jn_cg', cg);
    setEl('jn_kt', kt);
    setEl('jn_grand', cg + kt);
  }
  else if(shop === 'neythal_canteen'){
    const ct = v('nc_cc')+v('nc_cn')+v('nc_cp');
    const cg = ct - v('nc_ce');
    const kt = v('nc_kc')+v('nc_kn')+v('nc_kp');
    setEl('nc_ct', ct); setEl('nc_cg', cg);
    setEl('nc_kt', kt);
    setEl('nc_grand', cg + kt);
  }
  else if(shop === 'neythal_mm'){
    const ts = v('nm_cash')+v('nm_nets')+v('nm_paynow');
    setEl('nm_ts', ts);
    setEl('nm_float', v('nm_cash') - v('nm_boss'));
    setEl('nm_day', ts);
  }
  else if(shop === 'tuas_mm'){
    let d = 0, totalBoss = 0;
    ['p1','p2','p3'].forEach(p => {
      const tot = v(p+'_cash')+v(p+'_nets')+v(p+'_paynow');
      setEl(p+'_total', tot);
      setEl(p+'_float', v(p+'_cash') - v(p+'_boss'));
      setEl(p+'_net', tot);
      d += tot;
      totalBoss += v(p+'_boss');
    });
    setEl('tuas_boss_total', totalBoss);
    setEl('day_tot', d);
  }
  else if(shop === 'kaki_mm'){
    let d = 0, totalBoss = 0;
    ['p1','p2'].forEach(p => {
      const tot = v(p+'_cash')+v(p+'_nets')+v(p+'_paynow');
      setEl(p+'_total', tot);
      setEl(p+'_float', v(p+'_cash') - v(p+'_boss'));
      setEl(p+'_net', tot);
      d += tot;
      totalBoss += v(p+'_boss');
    });
    setEl('kaki_boss_total', totalBoss);
    setEl('day_tot', d);
  }
  const pb = document.getElementById('pvBox');
  if(pb && pb.style.display === 'block') pb.textContent = buildText(shop).txt;
}

// --- Build Report Text ---
function getNote(){
  const n = document.getElementById('notes');
  return n ? n.value.trim() : '';
}

function buildText(s){
  const n = new Date();
  const ds = `${pad(n.getDate())}/${pad(n.getMonth()+1)}/${n.getFullYear()}`;
  const ts2 = `${pad(n.getHours())}:${pad(n.getMinutes())}`;
  const ln = '━'.repeat(32);
  const note = getNote();
  let t = `🌶️ *786 SPICES GROUP*\n📋 *Daily Sales Report*\n${ln}\n🏪 ${NAMES[s]}\n📅 ${ds}   🕐 ${ts2}   📆 ${DAYS[n.getDay()]}\n${ln}\n`;
  let grand = 0;

  if(s === 'muri'){
    const tot = v('cash')+v('coins')+v('nets')+v('paynow');
    grand = tot - v('exp');
    t += `💵 Cash              : ${fmt(v('cash'))}\n🪙 Coins             : ${fmt(v('coins'))}\n💳 NETS              : ${fmt(v('nets'))}\n📱 PayNow            : ${fmt(v('paynow'))}\n${ln}\n📊 Total Sales       : ${fmt(tot)}\n➖ Expenses          : ${fmt(v('exp'))}\n${ln}\n✅ *GRAND TOTAL      : ${fmt(grand)}*\n🔒 Cash to Locker    : ${fmt(v('cash')-v('exp'))}\n`;
  }
  else if(s === 'jp_morning'){
    const cct = v('cc_cash')+v('cc_nets')+v('cc_paynow');
    const ccg = cct - v('cc_exp');
    const sst = v('ss_cash')+v('ss_nets')+v('ss_paynow');
    const ssg = sst - v('ss_exp');
    grand = cct + sst;
    t += `🍽️ *CANTEEN SALES*\n💵 Cash    : ${fmt(v('cc_cash'))}\n💳 NETS    : ${fmt(v('cc_nets'))}\n📱 PayNow  : ${fmt(v('cc_paynow'))}\n📊 Total   : ${fmt(cct)}\n➖ Expenses: ${fmt(v('cc_exp'))}\n✅ Grand   : ${fmt(ccg)}\n${ln}\n🛒 *SMALL SHOP SALES*\n💵 Cash    : ${fmt(v('ss_cash'))}\n💳 NETS    : ${fmt(v('ss_nets'))}\n📱 PayNow  : ${fmt(v('ss_paynow'))}\n📊 Total   : ${fmt(sst)}\n➖ Expenses: ${fmt(v('ss_exp'))}\n✅ Grand   : ${fmt(ssg)}\n${ln}\n🏆 *TOTAL MORNING SALES : ${fmt(grand)}*\n`;
  }
  else if(s === 'jp_night'){
    const ct = v('jn_cc')+v('jn_cn')+v('jn_cp');
    const cg = ct - v('jn_ce');
    const kt = v('jn_kc')+v('jn_kn')+v('jn_kp');
    grand = cg + kt;
    t += `🌙 *CANTEEN SALES*\n💵 Cash    : ${fmt(v('jn_cc'))}\n💳 NETS    : ${fmt(v('jn_cn'))}\n📱 PayNow  : ${fmt(v('jn_cp'))}\n📊 Total   : ${fmt(ct)}\n➖ Expenses: ${fmt(v('jn_ce'))}\n✅ Grand   : ${fmt(cg)}\n${ln}\n🎪 *CATERING SALES*\n💵 Cash    : ${fmt(v('jn_kc'))}\n💳 NETS    : ${fmt(v('jn_kn'))}\n📱 PayNow  : ${fmt(v('jn_kp'))}\n📊 Total   : ${fmt(kt)}\n${ln}\n🏆 *GRAND TOTAL : ${fmt(grand)}*\n`;
  }
  else if(s === 'neythal_canteen'){
    const ct = v('nc_cc')+v('nc_cn')+v('nc_cp');
    const cg = ct - v('nc_ce');
    const kt = v('nc_kc')+v('nc_kn')+v('nc_kp');
    grand = cg + kt;
    t += `🍽️ *CANTEEN SALES*\n💵 Cash    : ${fmt(v('nc_cc'))}\n💳 NETS    : ${fmt(v('nc_cn'))}\n📱 PayNow  : ${fmt(v('nc_cp'))}\n📊 Total   : ${fmt(ct)}\n➖ Expenses: ${fmt(v('nc_ce'))}\n✅ Grand   : ${fmt(cg)}\n${ln}\n🎪 *CATERING SALES*\n💵 Cash    : ${fmt(v('nc_kc'))}\n💳 NETS    : ${fmt(v('nc_kn'))}\n📱 PayNow  : ${fmt(v('nc_kp'))}\n📊 Total   : ${fmt(kt)}\n${ln}\n🏆 *GRAND TOTAL : ${fmt(grand)}*\n`;
  }
  else if(s === 'neythal_mm'){
    const tot = v('nm_cash')+v('nm_nets')+v('nm_paynow');
    grand = tot;
    t += `💵 Cash              : ${fmt(v('nm_cash'))}\n💳 NETS              : ${fmt(v('nm_nets'))}\n📱 PayNow            : ${fmt(v('nm_paynow'))}\n📊 Total Sales       : ${fmt(tot)}\n${ln}\n❌ Shortage          : ${fmt(v('nm_short'))}\n➕ Extra             : ${fmt(v('nm_extra'))}\n👔 Handover to Boss  : ${fmt(v('nm_boss'))}\n💰 Float Cash        : ${fmt(v('nm_cash')-v('nm_boss'))}\n🏭 Cash to Supplier  : ${fmt(v('nm_supplier'))}\n${ln}\n🏆 *DAY SALES TOTAL  : ${fmt(tot)}*\n`;
  }
  else if(s === 'tuas_mm'){
    let d = 0, totalBoss = 0;
    ['p1','p2','p3'].forEach((p,i) => {
      const tot = v(p+'_cash')+v(p+'_nets')+v(p+'_paynow');
      const fl = v(p+'_cash') - v(p+'_boss');
      d += tot;
      totalBoss += v(p+'_boss');
      t += `🖥️ *POS ${i+1}*\n💵 Cash    : ${fmt(v(p+'_cash'))}\n💳 NETS    : ${fmt(v(p+'_nets'))}\n📱 PayNow  : ${fmt(v(p+'_paynow'))}\n📊 Total   : ${fmt(tot)}\n❌ Shortage: ${fmt(v(p+'_short'))}\n➕ Extra   : ${fmt(v(p+'_extra'))}\n👔 Boss    : ${fmt(v(p+'_boss'))}\n💰 Float   : ${fmt(fl)}\n✅ Total POS ${i+1}: ${fmt(tot)}\n${ln}\n`;
    });
    grand = d;
    t += `🏭 Cash to Supplier      : ${fmt(v('tuas_supplier'))}\n👔 Total Handover to Boss : ${fmt(totalBoss)}\n🏆 *DAY SALES TOTAL      : ${fmt(grand)}*\n`;
  }
  else if(s === 'kaki_mm'){
    let d = 0, totalBoss = 0;
    ['p1','p2'].forEach((p,i) => {
      const tot = v(p+'_cash')+v(p+'_nets')+v(p+'_paynow');
      const fl = v(p+'_cash') - v(p+'_boss');
      d += tot;
      totalBoss += v(p+'_boss');
      t += `🖥️ *POS ${i+1}*\n💵 Cash    : ${fmt(v(p+'_cash'))}\n💳 NETS    : ${fmt(v(p+'_nets'))}\n📱 PayNow  : ${fmt(v(p+'_paynow'))}\n📊 Total   : ${fmt(tot)}\n❌ Shortage: ${fmt(v(p+'_short'))}\n➕ Extra   : ${fmt(v(p+'_extra'))}\n👔 Boss    : ${fmt(v(p+'_boss'))}\n💰 Float   : ${fmt(fl)}\n✅ Total POS ${i+1}: ${fmt(tot)}\n${ln}\n`;
    });
    grand = d;
    t += `🏭 Cash to Supplier      : ${fmt(v('kaki_supplier'))}\n👔 Total Handover to Boss : ${fmt(totalBoss)}\n🏆 *DAY SALES TOTAL      : ${fmt(grand)}*\n`;
  }

  if(note){
    t += `${ln}\n📝 *NOTES*\n${note}\n`;
  }
  t += `${ln}\n_Submitted via 786 Spices Sales App_`;
  return { txt: t, grand };
}

function togglePv(){
  const pb = document.getElementById('pvBox'), sr = document.getElementById('shareRow');
  if(!pb) return;
  const open = pb.style.display === 'block';
  pb.style.display = open ? 'none' : 'block';
  sr.classList.toggle('hidden', open);
  if(!open) pb.textContent = buildText(shop).txt;
}

function doCopy(txt){
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(() => toast('✅ Copied to clipboard!')); }
  else {
    const ta = document.createElement('textarea'); ta.value = txt;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('✅ Copied to clipboard!');
  }
}
function copyRpt(){ doCopy(buildText(shop).txt); }
function waRpt(){ window.open('https://wa.me/?text='+encodeURIComponent(buildText(shop).txt), '_blank'); }

function saveRpt(){
  if(!shop) return;
  const n = new Date(), {txt, grand} = buildText(shop);
  const note = getNote();
  const KEY = '786_reports', arr = JSON.parse(localStorage.getItem(KEY)||'[]');
  arr.unshift({
    id: Date.now(), shop, name: NAMES[shop],
    date: `${pad(n.getDate())}/${pad(n.getMonth()+1)}/${n.getFullYear()}`,
    time: `${pad(n.getHours())}:${pad(n.getMinutes())}`,
    grand, txt, note
  });
  localStorage.setItem(KEY, JSON.stringify(arr));
  renderSaved(); toast('✅ Report saved!');
}

function renderSaved(){
  const KEY = '786_reports', arr = JSON.parse(localStorage.getItem(KEY)||'[]');
  document.getElementById('saveCnt').textContent = `${arr.length} entr${arr.length===1?'y':'ies'}`;
  const list = document.getElementById('saveList');
  if(!arr.length){ list.innerHTML = '<div class="empty"><div class="ico">📋</div>No reports saved yet.</div>'; return; }
  list.innerHTML = arr.map(r => `
    <div class="saved-item">
      <div class="saved-top">
        <div>
          <div class="saved-name">${r.name}</div>
          <div class="saved-date">${r.date} at ${r.time}</div>
        </div>
        <div class="saved-right">
          <div class="saved-total">${fmt(r.grand)}</div>
          <div class="saved-acts">
            <button class="saved-cp" onclick="doCopy(getSaved(${r.id}).txt)">📋 Copy</button>
            <button class="saved-wa" onclick="waOld(${r.id})">${waIcon()} WA</button>
            <button class="saved-del" onclick="delRpt(${r.id})">✕</button>
          </div>
        </div>
      </div>
      ${r.note ? `<div class="saved-note">📝 ${r.note}</div>` : ''}
    </div>`).join('');
}

function getSaved(id){ return JSON.parse(localStorage.getItem('786_reports')||'[]').find(r => r.id === id) || {}; }
function waOld(id){ const r = getSaved(id); if(r.txt) window.open('https://wa.me/?text='+encodeURIComponent(r.txt), '_blank'); }
function delRpt(id){
  const KEY = '786_reports', arr = JSON.parse(localStorage.getItem(KEY)||'[]').filter(r => r.id !== id);
  localStorage.setItem(KEY, JSON.stringify(arr)); renderSaved(); toast('🗑️ Report deleted');
}

function waIcon(){
  return `<svg width="15" height="15" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="16" fill="rgba(255,255,255,0.2)"/><path d="M22.5 9.5A8.9 8.9 0 0 0 16 7a8.95 8.95 0 0 0-7.76 13.41L7 25l4.72-1.24A8.94 8.94 0 0 0 16 24.9a8.95 8.95 0 0 0 6.5-15.4zm-6.5 13.75a7.43 7.43 0 0 1-3.78-1.03l-.27-.16-2.8.73.75-2.73-.18-.28A7.45 7.45 0 1 1 16 23.25zm4.09-5.57c-.22-.11-1.32-.65-1.53-.72-.2-.08-.35-.11-.5.11-.15.22-.58.72-.71.87-.13.15-.26.17-.49.06-.22-.11-.94-.35-1.79-1.1-.66-.59-1.1-1.31-1.23-1.53-.13-.22-.01-.34.1-.45.1-.1.22-.26.33-.39.11-.13.15-.22.22-.37.08-.15.04-.28-.02-.39-.06-.11-.5-1.2-.68-1.65-.18-.43-.36-.37-.5-.38h-.43c-.15 0-.39.06-.59.28-.2.22-.78.76-.78 1.86s.8 2.16.91 2.31c.11.15 1.57 2.4 3.81 3.36.53.23.95.37 1.27.47.53.17 1.02.14 1.4.09.43-.06 1.32-.54 1.5-1.06.19-.52.19-.96.13-1.06-.06-.1-.2-.16-.43-.27z" fill="#fff"/></svg>`;
}

renderSaved();
</script>
