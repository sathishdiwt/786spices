<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>786 Spices вЂ” Daily Sales Report</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C8A55A;
  --gold2: #E2C97E;
  --gold3: #F5E6B8;
  --gold-dim: rgba(200,165,90,0.15);
  --dark: #0F0A04;
  --dark2: #1C1308;
  --dark3: #261A0A;
  --brown: #7C4A1A;
  --cream: #FBF6E9;
  --cream2: #F3EAD3;
  --text: #1E1106;
  --text2: #7A6040;
  --border: #DDC88A;
  --border2: rgba(200,165,90,0.25);
  --green: #1E6E4A;
  --red: #9B2B1F;
  --blue: #1A4A8A;
  --wa: #25D366;
  --wa2: #128C7E;
  --shadow: 0 4px 24px rgba(60,30,0,0.10);
  --radius: 16px;
  --radius2: 10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C8A55A' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}

/* HEADER */
.header{background:var(--dark);position:relative;overflow:hidden}
.header-bg{position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 20px,rgba(200,165,90,0.03) 20px,rgba(200,165,90,0.03) 21px)}
.header-glow{position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(200,165,90,0.12) 0%,transparent 70%);top:-100px;left:50%;transform:translateX(-50%);pointer-events:none}
.header-inner{position:relative;z-index:1;padding:24px 20px 18px;text-align:center}
.logo-ring{width:64px;height:64px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;background:rgba(200,165,90,0.08);position:relative}
.logo-ring::before{content:'';position:absolute;inset:-5px;border:1px solid rgba(200,165,90,0.2);border-radius:50%}
.logo-ring span{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--gold)}
.logo-ring a{text-decoration:none;color:inherit}
.header h1{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--gold2);letter-spacing:0.02em}
.header h1 a{text-decoration:none;color:inherit}
.header-sub{font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:rgba(200,165,90,0.5);margin-top:2px}
.dt-bar{background:var(--dark2);border-top:1px solid rgba(200,165,90,0.18);display:grid;grid-template-columns:1fr 1fr 1fr;padding:10px 12px}
.dt-item{text-align:center}
.dt-label{font-size:9px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:rgba(200,165,90,0.45)}
.dt-val{font-size:13px;font-weight:600;color:var(--gold2);margin-top:2px}

/* LAYOUT */
.main{max-width:540px;margin:0 auto;padding:16px 12px 100px}

/* CARDS */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.card-head{background:var(--dark);padding:13px 18px;display:flex;align-items:center;gap:10px}
.card-head h2{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--gold2);flex:1}
.badge{background:rgba(200,165,90,0.18);color:var(--gold);font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.05em;white-space:nowrap}
.card-body{padding:16px}

/* SELECT */
.sel-wrap{position:relative}
.sel-wrap select{width:100%;padding:14px 42px 14px 16px;border:1.5px solid var(--border);border-radius:var(--radius2);font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;color:var(--text);background:var(--cream);appearance:none;-webkit-appearance:none;cursor:pointer;transition:border-color 0.15s}
.sel-wrap select:focus{outline:none;border-color:var(--gold);background:var(--gold3)}
.sel-wrap::after{content:'в–ѕ';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:17px;pointer-events:none}

/* DATE ROW */
.date-row{display:flex;align-items:center;gap:10px;margin-top:12px}
.date-toggle{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;user-select:none;padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--cream);white-space:nowrap;transition:background 0.15s,border-color 0.15s}
.date-toggle.active{background:var(--gold3);border-color:var(--gold);color:var(--brown)}
.date-inp-wrap{flex:1}
.date-inp-wrap input[type=date]{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;color:var(--text);background:var(--cream);appearance:none;-webkit-appearance:none;transition:border-color 0.15s;display:none}
.date-inp-wrap input[type=date].visible{display:block}
.date-inp-wrap input[type=date]:focus{outline:none;border-color:var(--gold);background:var(--gold3)}
.date-auto-lbl{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);background:var(--cream2);text-align:center}

/* SECTION LABEL */
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin:18px 0 11px;display:flex;align-items:center;gap:10px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* BLOCK */
.blk{background:var(--cream);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:13px}
.blk-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:var(--brown);margin-bottom:13px;padding-bottom:9px;border-bottom:1px dashed var(--border)}

/* FIELD ROW */
.frow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.frow label{font-size:12px;font-weight:600;color:var(--text2);width:120px;flex-shrink:0;letter-spacing:0.01em}
.inp-wrap{flex:1;position:relative}
.inp-wrap .pfx{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;font-weight:500;pointer-events:none}
.inp-wrap input{width:100%;padding:11px 10px 11px 28px;border:1.5px solid var(--border);border-radius:8px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;color:var(--text);background:#fff;-webkit-appearance:none;appearance:none;transition:border-color 0.15s,background 0.15s}
.inp-wrap input:focus{outline:none;border-color:var(--gold);background:var(--gold3)}
.inp-wrap input.neg{border-color:#E5C9A0;background:#FFF7EC;color:var(--red)}
.inp-wrap input.neg:focus{border-color:var(--brown)}
.inp-wrap input.cc{border-color:#9FC5E8;background:#EEF4FF}
.inp-wrap input.cc:focus{border-color:var(--blue);background:#DDE8F8}

/* TOTAL ROWS */
.trow{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-radius:9px;margin-top:8px;background:var(--cream2);border:1px solid var(--border)}
.trow-lbl{font-size:12px;font-weight:500;color:var(--text2)}
.trow-val{font-size:16px;font-weight:700;color:var(--text)}
.trow.grand{background:var(--dark);border:none;margin-top:11px}
.trow.grand .trow-lbl{color:var(--gold);font-weight:600;font-size:13px}
.trow.grand .trow-val{color:var(--gold2);font-size:21px}
.trow.day{background:linear-gradient(135deg,var(--brown) 0%,#3D1A05 100%);border:none;margin-top:11px}
.trow.day .trow-lbl{color:var(--gold3);font-weight:600;font-size:13px}
.trow.day .trow-val{color:#FFE082;font-size:21px}
.trow.sub{background:#EEF6FF;border-color:#C5DAFF;margin-top:8px}
.trow.sub .trow-lbl{color:var(--blue)}
.trow.sub .trow-val{color:var(--blue)}
.trow.neg-row{background:#FFF7EC;border-color:#E5C9A0;margin-top:8px}
.trow.neg-row .trow-lbl{color:var(--red)}
.trow.neg-row .trow-val{color:var(--red)}

/* NOTES */
.notes-wrap textarea{width:100%;min-height:90px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius2);font-family:'Outfit',sans-serif;font-size:14px;font-weight:400;color:var(--text);background:var(--cream);resize:vertical;line-height:1.6;transition:border-color 0.15s}
.notes-wrap textarea:focus{outline:none;border-color:var(--gold);background:var(--gold3)}
.notes-wrap textarea::placeholder{color:#bba880}

/* BUTTONS */
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.btn-save{padding:15px 10px;background:var(--dark);border:2px solid var(--gold);border-radius:12px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gold2);cursor:pointer;transition:all 0.15s;width:100%}
.btn-save:active{transform:scale(0.97);background:var(--dark3)}
.btn-prev{padding:15px 10px;background:var(--cream2);border:1.5px solid var(--border);border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:var(--brown);cursor:pointer;transition:all 0.15s;width:100%}
.btn-prev:active{background:var(--border)}
.share-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.share-row.hidden{display:none}
.btn-copy{padding:13px 8px;background:var(--cream2);border:1.5px solid var(--border);border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:var(--brown);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s}
.btn-copy:active{background:var(--border)}
.btn-wa{padding:13px 8px;background:var(--wa);border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s}
.btn-wa:active{background:var(--wa2)}

/* PREVIEW BOX */
.pv-box{background:#f0faf5;border:1.5px solid #a8d5bc;border-radius:10px;padding:13px;margin-top:12px;font-size:12.5px;color:#1a4a30;white-space:pre-wrap;line-height:1.68;font-family:'Courier New',monospace;display:none;word-break:break-word;max-height:280px;overflow-y:auto}

/* SAVED ITEMS */
.saved-item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:10px;transition:box-shadow 0.15s}
.saved-item:last-child{margin-bottom:0}
.saved-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.saved-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--brown)}
.saved-date{font-size:11px;color:var(--text2);margin-top:2px}
.saved-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.saved-total{font-size:19px;font-weight:700;color:var(--green)}
.saved-acts{display:flex;gap:5px;align-items:center}
.saved-cp{background:var(--cream2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--brown);cursor:pointer}
.saved-wa{background:var(--wa);border:none;border-radius:7px;padding:6px 9px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;gap:3px}
.saved-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;padding:2px 4px;line-height:1}
.saved-del:active{color:var(--red)}
.saved-note{font-size:11.5px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-style:italic;line-height:1.5}

.empty{text-align:center;padding:30px 16px;color:var(--text2);font-size:14px}
.empty .ico{font-size:32px;margin-bottom:8px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);color:var(--gold2);font-size:14px;font-weight:500;padding:12px 24px;border-radius:30px;border:1px solid var(--gold);z-index:9999;transition:transform 0.28s cubic-bezier(.175,.885,.32,1.275);white-space:nowrap;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:380px){
  .frow label{width:98px;font-size:11px}
  .inp-wrap input{font-size:14px}
  .header h1{font-size:20px}
  .saved-total{font-size:16px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-bg"></div>
  <div class="header-glow"></div>
  <div class="header-inner">
    <div class="logo-ring"><span><a href="index.html">786</a></span></div>
    <h1><a href="index.html">786 Spices Group</a></h1>
    <div class="header-sub">Daily Sales Report System</div>
  </div>
  <div class="dt-bar">
    <div class="dt-item"><div class="dt-label">Date</div><div class="dt-val" id="ld">вЂ”</div></div>
    <div class="dt-item"><div class="dt-label">Time</div><div class="dt-val" id="lt">вЂ”</div></div>
    <div class="dt-item"><div class="dt-label">Day</div><div class="dt-val" id="lday">вЂ”</div></div>
  </div>
</div>

<div class="main">

  <div class="card">
    <div class="card-head"><h2>Select Shop &amp; Date</h2></div>
    <div class="card-body">
      <div class="sel-wrap">
        <select id="shopSel" onchange="renderForm()">
          <option value="">вЂ” Choose a shop вЂ”</option>
          <option value="muri">2D Jalan Papan вЂ” Muri Shop</option>
          <option value="jp_morning">2D Jalan Papan вЂ” Canteen (Morning)</option>
          <option value="jp_night">2D Jalan Papan вЂ” Canteen (Night)</option>
          <option value="neythal_canteen">20 Neythal Road вЂ” Canteen</option>
          <option value="neythal_mm">20 Neythal Road вЂ” Mini Mart</option>
          <option value="tuas_mm">36 Tuas вЂ” Mini Mart</option>
          <option value="kaki_mm">18 Kaki Bukit вЂ” Mini Mart</option>
        </select>
      </div>
      <div class="date-row">
        <label class="date-toggle" id="dateToggleLbl" onclick="toggleDateMode()">вњЏпёЏ Manual Date</label>
        <div class="date-inp-wrap">
          <div class="date-auto-lbl" id="dateAutoLbl">Auto вЂ” today's date</div>
          <input type="date" id="manualDate" oninput="calc()">
        </div>
      </div>
    </div>
  </div>

  <div id="formArea"></div>

  <div class="card">
    <div class="card-head">
      <h2>Saved Reports</h2>
      <span class="badge" id="saveCnt">0 entries</span>
    </div>
    <div class="card-body" id="saveList">
      <div class="empty"><div class="ico">рџ“‹</div>No reports saved yet.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function pad(x){return String(x).padStart(2,'0')}
function clock(){
  const n=new Date();
  document.getElementById('ld').textContent=`${pad(n.getDate())}/${pad(n.getMonth()+1)}/${n.getFullYear()}`;
  document.getElementById('lt').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('lday').textContent=DAYS[n.getDay()];
}
clock();setInterval(clock,1000);

let manualDateMode=false;
function toggleDateMode(){
  manualDateMode=!manualDateMode;
  const lbl=document.getElementById('dateToggleLbl');
  const autoLbl=document.getElementById('dateAutoLbl');
  const inp=document.getElementById('manualDate');
  if(manualDateMode){
    lbl.classList.add('active');
    autoLbl.style.display='none';
    inp.classList.add('visible');
    if(!inp.value){const n=new Date();inp.value=`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`}
  } else {
    lbl.classList.remove('active');
    autoLbl.style.display='';
    inp.classList.remove('visible');
  }
  calc();
}

function getReportDate(){
  if(manualDateMode){
    const inp=document.getElementById('manualDate');
    if(inp&&inp.value){
      const[y,m,d]=inp.value.split('-');
      const dt=new Date(+y,+m-1,+d);
      return{ds:`${pad(d)}/${pad(m)}/${y}`,dayName:DAYS[dt.getDay()]};
    }
  }
  const n=new Date();
  return{ds:`${pad(n.getDate())}/${pad(n.getMonth()+1)}/${n.getFullYear()}`,dayName:DAYS[n.getDay()]};
}

function fmt(n){return'$'+(+n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function v(id){return parseFloat(document.getElementById(id)?.value)||0}
function setEl(id,val){const e=document.getElementById(id);if(e)e.textContent=fmt(val)}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}

const NAMES={
  muri:'2D Jalan Papan вЂ” Muri Shop',
  jp_morning:'2D Jalan Papan вЂ” Canteen (Morning)',
  jp_night:'2D Jalan Papan вЂ” Canteen (Night)',
  neythal_canteen:'20 Neythal Road вЂ” Canteen',
  neythal_mm:'20 Neythal Road вЂ” Mini Mart',
  tuas_mm:'36 Tuas вЂ” Mini Mart',
  kaki_mm:'18 Kaki Bukit вЂ” Mini Mart'
};
let shop='';

// в”Ђв”Ђв”Ђ HTML BUILDERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function fld(id,lbl,cls=''){
  return`<div class="frow"><label for="${id}">${lbl}</label><div class="inp-wrap"><span class="pfx">$</span><input type="number" inputmode="decimal" id="${id}" min="0" step="0.01" placeholder="0.00"${cls?` class="${cls}"`:''} oninput="calc()"></div></div>`;
}
function trow(lbl,id,cls=''){
  return`<div class="trow${cls?' '+cls:''}"><span class="trow-lbl">${lbl}</span><span class="trow-val" id="${id}">$0.00</span></div>`;
}
function blkO(title){return`<div class="blk"><div class="blk-title">${title}</div>`}
function blkC(){return`</div>`}
function secLbl(txt){return`<div class="sec-lbl">${txt}</div>`}

function posBlock(p,num,hasCCTerminal){
  const ccField=hasCCTerminal?fld(p+'_cc','CC Terminal','cc'):'';
  return blkO(`рџ–ҐпёЏ POS ${num} Sales`)+
    fld(p+'_cash','CASH')+fld(p+'_nets','NETS')+fld(p+'_paynow','PayNow')+ccField+
    trow(`Total Sales POS ${num}`,p+'_total')+
    secLbl('Adjustments')+
    fld(p+'_short','Shortage','neg')+fld(p+'_extra','Extra')+
    fld(p+'_boss','Handover to Boss')+
    trow('Float Cash (Cash в€’ Boss)',p+'_float','sub')+
    trow(`Net Sales POS ${num}`,p+'_net','sub')+
    blkC();
}

// в”Ђв”Ђв”Ђ JP MORNING: Canteen + Small Shop (both with COINS) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function jpMorningBlk(prefix, icon, title) {
  return blkO(`${icon} ${title}`) +
    fld(prefix+'_cash','CASH') +
    fld(prefix+'_coins','COINS') +
    fld(prefix+'_nets','NETS') +
    fld(prefix+'_paynow','PayNow') +
    trow('Total Sales', prefix+'_tot') +
    secLbl('Expenses') +
    fld(prefix+'_exp','Expenses') +
    trow('Grand Total', prefix+'_grand') +
    blkC();
}

// в”Ђв”Ђв”Ђ JP NIGHT: Canteen (with expenses info, grand = total) + Catering в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function jpNightCanteenBlk() {
  return blkO('рџЊ™ Canteen Sales') +
    fld('jn_c_cash','CASH') +
    fld('jn_c_nets','NETS') +
    fld('jn_c_paynow','PayNow') +
    trow('Total Sales', 'jn_c_tot') +

// в”Ђв”Ђв”Ђ CALC в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function calc(){
  if(!shop)return;

  if(shop==='muri'){
    const ts=v('cash')+v('coins')+v('nets')+v('paynow');
    const gt=ts+v('exp');
    setEl('ts',ts);setEl('gt',gt);
    setEl('ctl',v('cash')-v('exp'));
  }

  // JP MORNING:
  // Canteen Total = CASH+COINS+NETS+PayNow; Grand = Total в€’ Expenses
  // Small Shop Total = CASH+COINS+NETS+PayNow; Grand = Total в€’ Expenses
  // Total Morning Sales = Canteen Total + Small Shop Total (raw, NOT grands)
  else if(shop==='jp_morning'){
    const cct=v('cc_cash')+v('cc_coins')+v('cc_nets')+v('cc_paynow');
    const ccg=cct+v('cc_exp');
    const sst=v('ss_cash')+v('ss_coins')+v('ss_nets')+v('ss_paynow');
    const ssg=sst+v('ss_exp');
    setEl('cc_tot',cct);
    setEl('cc_grand',ccg);
    setEl('ss_tot',sst);
    setEl('ss_grand',ssg);
    // Total Morning Sales = sum of raw totals
    setEl('morning_total', cct + sst);
  }

  // JP NIGHT:
  // Canteen Total = CASH+NETS+PayNow; Grand = Total (expenses shown but NOT deducted from grand)
  // Catering Total = CASH+NETS+PayNow
  // Grand Total = Canteen Grand + Catering Total
  else if(shop==='jp_night'){
    const ct=v('jn_c_cash')+v('jn_c_nets')+v('jn_c_paynow');
    const cg=ct+v('jn_c_exp'); // Grand = Total + Expenses
    const kt=v('jn_k_cash')+v('jn_k_nets')+v('jn_k_paynow');
    setEl('jn_c_tot',ct);
    setEl('jn_c_grand',cg);
    setEl('jn_k_tot',kt);
    setEl('jn_grand',cg+kt);
  }

  else if(shop==='neythal_canteen'){
    const ct=v('nc_c_cash')+v('nc_c_nets')+v('nc_c_paynow')+v('nc_c_cc')+v('nc_c_exp');
    const cg=ct;
    const kt=v('nc_k_cash')+v('nc_k_nets')+v('nc_k_paynow')+v('nc_k_cc');
    const kg=kt-v('nc_k_exp');
    setEl('nc_c_tot',ct);setEl('nc_c_grand',cg);
    setEl('nc_k_tot',kt);setEl('nc_k_grand',kg);
    setEl('nc_grand',cg+kg);
    setEl('nc_locker',v('nc_c_cash')+v('nc_k_cash'));
  }

  else if(shop==='neythal_mm'){
    const ts=v('nm_cash')+v('nm_nets')+v('nm_paynow');
    setEl('nm_ts',ts);
    setEl('nm_float',v('nm_cash')-v('nm_boss'));
    setEl('nm_day',ts);
  }

  else if(shop==='tuas_mm'){
    let d=0,totalBoss=0;
    ['p1','p2','p3'].forEach(p=>{
      const tot=v(p+'_cash')+v(p+'_nets')+v(p+'_paynow')+v(p+'_cc');
      setEl(p+'_total',tot);
      setEl(p+'_float',v(p+'_cash')-v(p+'_boss'));
      setEl(p+'_net',tot);
      d+=tot;totalBoss+=v(p+'_boss');
    });
    setEl('tuas_boss_total',totalBoss);
    setEl('day_tot',d);
  }

  else if(shop==='kaki_mm'){
    let d=0,totalBoss=0;
    ['p1','p2'].forEach(p=>{
      const tot=v(p+'_cash')+v(p+'_nets')+v(p+'_paynow');
      setEl(p+'_total',tot);
      setEl(p+'_float',v(p+'_cash')-v(p+'_boss'));
      setEl(p+'_net',tot);
      d+=tot;totalBoss+=v(p+'_boss');
    });
    setEl('kaki_boss_total',totalBoss);
    setEl('day_tot',d);
  }

  const pb=document.getElementById('pvBox');
  if(pb&&pb.style.display==='block')pb.textContent=buildText(shop).txt;
}

// в”Ђв”Ђв”Ђ BUILD REPORT TEXT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  }

  // JP NIGHT: Canteen Grand = Total (expenses shown), Grand Total = Canteen Grand + Catering Total
  else if(s==='jp_night'){

  }

  else if(s==='neythal_canteen'){
    const ct=v('nc_c_cash')+v('nc_c_nets')+v('nc_c_paynow')+v('nc_c_cc')+v('nc_c_exp');
    const cg=ct;
    const kt=v('nc_k_cash')+v('nc_k_nets')+v('nc_k_paynow')+v('nc_k_cc');

  else if(s==='kaki_mm'){

// в”Ђв”Ђв”Ђ UI ACTIONS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function togglePv(){
  const pb=document.getElementById('pvBox'),sr=document.getElementById('shareRow');
  if(!pb)return;
  const open=pb.style.display==='block';
  pb.style.display=open?'none':'block';
  sr.classList.toggle('hidden',open);
  if(!open)pb.textContent=buildText(shop).txt;
}

function doCopy(txt){
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('вњ… Copied!'))}
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('вњ… Copied!')}
}
function copyRpt(){doCopy(buildText(shop).txt)}
function waRpt(){window.open('https://wa.me/?text='+encodeURIComponent(buildText(shop).txt),'_blank')}

function saveRpt(){
  if(!shop)return;
  const n=new Date(),{txt,grand}=buildText(shop);
  const note=getNote();
  const{ds}=getReportDate();
  const ts2=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
  const KEY='786_reports',arr=JSON.parse(localStorage.getItem(KEY)||'[]');
  arr.unshift({id:Date.now(),shop,name:NAMES[shop],date:ds,time:ts2,grand,txt,note});
  localStorage.setItem(KEY,JSON.stringify(arr));
  renderSaved();toast('вњ… Report saved!');
}

function renderSaved(){
  const KEY='786_reports',arr=JSON.parse(localStorage.getItem(KEY)||'[]');
  document.getElementById('saveCnt').textContent=`${arr.length} entr${arr.length===1?'y':'ies'}`;
  const list=document.getElementById('saveList');
  if(!arr.length){list.innerHTML='<div class="empty"><div class="ico">рџ“‹</div>No reports saved yet.</div>';return}
  list.innerHTML=arr.map(r=>`
    <div class="saved-item">
      <div class="saved-top">
        <div>
          <div class="saved-name">${r.name}</div>
          <div class="saved-date">${r.date} at ${r.time}</div>
        </div>
        <div class="saved-right">
          <div class="saved-total">${fmt(r.grand)}</div>
          <div class="saved-acts">
            <button class="saved-cp" onclick="doCopy(getSaved(${r.id}).txt)">рџ“‹ Copy</button>
            <button class="saved-wa" onclick="waOld(${r.id})">${waIcon()} WA</button>
            <button class="saved-del" onclick="delRpt(${r.id})">вњ•</button>
          </div>
        </div>
      </div>
      ${r.note?`<div class="saved-note">рџ“ќ ${r.note}</div>`:''}
    </div>`).join('');
}

function getSaved(id){return JSON.parse(localStorage.getItem('786_reports')||'[]').find(r=>r.id===id)||{}}
function waOld(id){const r=getSaved(id);if(r.txt)window.open('https://wa.me/?text='+encodeURIComponent(r.txt),'_blank')}
function delRpt(id){
  const KEY='786_reports',arr=JSON.parse(localStorage.getItem(KEY)||'[]').filter(r=>r.id!==id);
  localStorage.setItem(KEY,JSON.stringify(arr));renderSaved();toast('рџ—‘пёЏ Deleted');
}

function waIcon(){
  return`<svg width="15" height="15" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="16" fill="rgba(255,255,255,0.2)"/><path d="M22.5 9.5A8.9 8.9 0 0 0 16 7a8.95 8.95 0 0 0-7.76 13.41L7 25l4.72-1.24A8.94 8.94 0 0 0 16 24.9a8.95 8.95 0 0 0 6.5-15.4zm-6.5 13.75a7.43 7.43 0 0 1-3.78-1.03l-.27-.16-2.8.73.75-2.73-.18-.28A7.45 7.45 0 1 1 16 23.25zm4.09-5.57c-.22-.11-1.32-.65-1.53-.72-.2-.08-.35-.11-.5.11-.15.22-.58.72-.71.87-.13.15-.26.17-.49.06-.22-.11-.94-.35-1.79-1.1-.66-.59-1.1-1.31-1.23-1.53-.13-.22-.01-.34.1-.45.1-.1.22-.26.33-.39.11-.13.15-.22.22-.37.08-.15.04-.28-.02-.39-.06-.11-.5-1.2-.68-1.65-.18-.43-.36-.37-.5-.38h-.43c-.15 0-.39.06-.59.28-.2.22-.78.76-.78 1.86s.8 2.16.91 2.31c.11.15 1.57 2.4 3.81 3.36.53.23.95.37 1.27.47.53.17 1.02.14 1.4.09.43-.06 1.32-.54 1.5-1.06.19-.52.19-.96.13-1.06-.06-.1-.2-.16-.43-.27z" fill="#fff"/></svg>`;
}

renderSaved();
</script>
