<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>786 Spices — Sales Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-light:#E8C96D;--gold-pale:#FAF3E0;
  --dark:#1A1208;--dark2:#2E2010;--brown:#6B3E10;
  --cream:#FDF8EE;--cream2:#F5EDD8;
  --text:#2C1A08;--text2:#6B5A3E;--border:#DFC98A;
  --green:#2E7D5A;--red:#B03A2E;--white:#FFFFFF;
  --wa:#25D366;--wa-dk:#128C7E;
  --sh:0 2px 14px rgba(100,60,0,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

.header{background:var(--dark);padding:20px 0 0;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(201,168,76,0.04) 18px,rgba(201,168,76,0.04) 19px);}
.hi{position:relative;z-index:1;padding-bottom:16px;}
.logo{width:58px;height:58px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);background:rgba(201,168,76,0.08);}
.header h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold-light);}
.header p{color:rgba(201,168,76,0.55);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;margin-top:3px;}
.dtbar{background:var(--dark2);border-top:1px solid rgba(201,168,76,0.2);padding:10px 12px;display:flex;justify-content:space-around;}
.dt{font-size:11px;color:rgba(201,168,76,0.65);text-align:center;}
.dt strong{display:block;color:var(--gold-light);font-size:13px;font-weight:600;margin-top:1px;}

.main{max-width:520px;margin:0 auto;padding:14px 12px 80px;}

.card{background:var(--white);border-radius:14px;border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden;}
.ch{background:var(--dark);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.ch h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--gold-light);flex:1;}
.badge{background:rgba(201,168,76,0.18);color:var(--gold);font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:0.04em;white-space:nowrap;}
.cb{padding:14px;}

.sswrap{position:relative;}
.sswrap select{width:100%;padding:14px 40px 14px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;color:var(--text);background:var(--cream);appearance:none;-webkit-appearance:none;cursor:pointer;}
.sswrap select:focus{outline:none;border-color:var(--gold);background:var(--gold-pale);}
.sswrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:16px;pointer-events:none;}

.sl{font-size:10px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.14em;margin:16px 0 10px;display:flex;align-items:center;gap:8px;}
.sl::after{content:'';flex:1;height:1px;background:var(--border);}
.sblk{background:var(--cream);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:12px;}
.sbt{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--brown);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

.fr{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.fr label{font-size:13px;font-weight:500;color:var(--text2);width:108px;flex-shrink:0;}
.iw{flex:1;position:relative;}
.iw::before{content:'$';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;pointer-events:none;}
.iw input{width:100%;padding:11px 10px 11px 26px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;color:var(--text);background:var(--white);-webkit-appearance:none;appearance:none;}
.iw input:focus{outline:none;border-color:var(--gold);background:var(--gold-pale);}
.iw input.neg{border-color:#DEB887;background:#FFF9F0;}

.tr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;margin-top:7px;background:var(--cream2);border:1px solid var(--border);}
.tl{font-size:12px;font-weight:500;color:var(--text2);}
.tv{font-size:16px;font-weight:600;color:var(--text);}
.tr.gt{background:var(--dark);border:none;margin-top:10px;}
.tr.gt .tl{color:var(--gold);font-weight:600;font-size:13px;}
.tr.gt .tv{color:var(--gold-light);font-size:20px;}
.tr.dt2{background:var(--brown);border:none;margin-top:10px;}
.tr.dt2 .tl{color:var(--gold-pale);font-weight:600;font-size:13px;}
.tr.dt2 .tv{color:#FFE082;font-size:20px;}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.sbtn{padding:14px 10px;border:2px solid var(--gold);border-radius:12px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--gold-light);background:var(--dark);cursor:pointer;width:100%;transition:all 0.15s;}
.sbtn:active{transform:scale(0.97);}
.pbtn{padding:14px 10px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--brown);background:var(--cream2);cursor:pointer;width:100%;transition:all 0.15s;}
.pbtn:active{background:var(--border);}

.share-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.share-row.hidden{display:none;}
.cpbtn{padding:13px 8px;background:var(--cream2);border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--brown);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s;}
.cpbtn:active{background:var(--border);}
.wabtn{padding:13px 8px;background:var(--wa);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s;}
.wabtn:active{background:var(--wa-dk);}

.pvbox{background:#f0faf5;border:1.5px solid #a8d5bc;border-radius:10px;padding:12px;margin-top:10px;font-size:12.5px;color:#1a4a30;white-space:pre-wrap;line-height:1.65;font-family:monospace;display:none;word-break:break-word;max-height:260px;overflow-y:auto;}

.sr{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:9px;}
.sr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.sr-shop{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--brown);}
.sr-date{font-size:11px;color:var(--text2);margin-top:2px;}
.sr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.sr-tot{font-size:18px;font-weight:700;color:var(--green);}
.sr-acts{display:flex;gap:5px;align-items:center;}
.sr-cp{background:var(--cream2);border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;font-weight:600;color:var(--brown);cursor:pointer;}
.sr-wa{background:var(--wa);border:none;border-radius:7px;padding:6px 9px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;gap:3px;}
.delbtn{background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;padding:2px 4px;line-height:1;}
.delbtn:active{color:var(--red);}
.empty{text-align:center;padding:26px 16px;color:var(--text2);font-size:14px;}
.empty .ico{font-size:30px;margin-bottom:8px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--dark);color:var(--gold-light);font-size:14px;font-weight:500;padding:11px 22px;border-radius:30px;border:1px solid var(--gold);z-index:9999;transition:transform 0.28s ease;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:380px){
  .fr label{width:90px;font-size:12px;}
  .iw input{font-size:15px;}
  .header h1{font-size:19px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="hi">
    <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">786</a></div>
    <h1><a href="index.html" style="text-decoration:none; color:inherit;">786 Spices Group</a></h1>
    <p>Daily Sales Report</p>
  </div>
  <div class="dtbar">
    <div class="dt">Date<strong id="ld">—</strong></div>
    <div class="dt">Time<strong id="lt">—</strong></div>
    <div class="dt">Day<strong id="lday">—</strong></div>
  </div>
</div>

<div class="main">
  <div class="card">
    <div class="ch"><h2>Select Shop</h2></div>
    <div class="cb">
      <div class="sswrap">
        <select id="shopSel" onchange="renderForm()">
          <option value="">— Choose a shop —</option>
          <option value="muri">2D Jalan Papan — Muri Shop</option>
          <option value="jp_canteen">2D Jalan Papan — Canteen</option>
          <option value="neythal_canteen">20 Neythal Road — Canteen</option>
          <option value="neythal_mm">20 Neythal Road — Mini Mart</option>
          <option value="tuas_mm">36 Tuas — Mini Mart</option>
          <option value="kaki_mm">18 Kaki Bukit — Mini Mart</option>
        </select>
      </div>
    </div>
  </div>

  <div id="formArea"></div>

  <div class="card">
    <div class="ch">
      <h2>Saved Reports</h2>
      <span class="badge" id="saveCnt">0 entries</span>
    </div>
    <div class="cb" id="saveList">
      <div class="empty"><div class="ico">📋</div>No reports saved yet.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function pad(x){return String(x).padStart(2,'0');}
function clock(){
  const n=new Date();
  document.getElementById('ld').textContent=`${pad(n.getDate())}/${pad(n.getMonth()+1)}/${n.getFullYear()}`;
  document.getElementById('lt').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('lday').textContent=DAYS[n.getDay()];
}
clock(); setInterval(clock,1000);

function fmt(n){return '$'+(+n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function v(id){return parseFloat(document.getElementById(id)?.value)||0;}
function setEl(id,val){const e=document.getElementById(id);if(e)e.textContent=fmt(val);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

const NAMES={
  muri:'2D Jalan Papan — Muri Shop',
  jp_canteen:'2D Jalan Papan — Canteen',
  neythal_canteen:'20 Neythal Road — Canteen',
  neythal_mm:'20 Neythal Road — Mini Mart',
  tuas_mm:'36 Tuas — Mini Mart',
  kaki_mm:'18 Kaki Bukit — Mini Mart'
};
let shop='';

function fld(id,lbl,cls){
  return `<div class="fr"><label for="${id}">${lbl}</label><div class="iw"><input type="number" inputmode="decimal" id="${id}" min="0" step="0.01" placeholder="0.00"${cls?` class="${cls}"`:''}  oninput="calc()"></div></div>`;
}
function trow(lbl,id,s){
  const c=s==='gt'?'gt':s==='dt'?'dt2':'';
  return `<div class="tr ${c}"><span class="tl">${lbl}</span><span class="tv" id="${id}">$0.00</span></div>`;
}
function posBlk(p,lbl){
  return `<div class="sblk"><div class="sbt">${lbl}</div>
    ${fld(p+'_cash','CASH')}${fld(p+'_nets','NETS')}${fld(p+'_paynow','PayNow')}
    ${trow('Total Sales',p+'_total')}
    <div class="sl">Adjustments</div>
    ${fld(p+'_short','Shortage','neg')}${fld(p+'_extra','Extra')}
    ${trow('Total Sales (Net)',p+'_net')}
    ${fld(p+'_boss','Handover to Boss')}${fld(p+'_float','Float Cash')}
  </div>`;
}

function renderForm(){
  shop=document.getElementById('shopSel').value;
  const area=document.getElementById('formArea');
  if(!shop){area.innerHTML='';return;}
  let inn='';
  if(shop==='muri'){
    inn=`<div class="sl">Sales Breakdown</div>
      ${fld('cash','CASH')}${fld('coins','COINS')}${fld('nets','NETS')}${fld('paynow','PayNow')}
      ${trow('Total Sales','ts')}
      <div class="sl">Expenses</div>
      ${fld('exp','Expenses','neg')}
      ${trow('Grand Total','gt','gt')}`;
  } else if(shop==='jp_canteen'||shop==='neythal_canteen'){
    const p=shop==='jp_canteen'?'jp':'nc';
    inn=`<div class="sblk"><div class="sbt">Canteen Sales</div>
        ${fld(p+'_cc','CASH')}${fld(p+'_cn','NETS')}${fld(p+'_cp','PayNow')}
        ${trow('Total Sales Canteen',p+'_ct')}
        <div class="sl">Expenses</div>${fld(p+'_ce','Expenses','neg')}
        ${trow('Canteen Grand Total',p+'_cg')}
      </div>
      <div class="sblk"><div class="sbt">Catering Sales</div>
        ${fld(p+'_kc','CASH')}${fld(p+'_kn','NETS')}${fld(p+'_kp','PayNow')}
        ${trow('Total Sales Catering',p+'_kt')}
        <div class="sl">Expenses</div>${fld(p+'_ke','Expenses','neg')}
        ${trow('Catering Grand Total',p+'_kg')}
      </div>
      ${trow('Grand Total (Canteen + Catering)',p+'_grand','gt')}`;
  } else if(shop==='neythal_mm'){
    inn=`<div class="sl">Sales Breakdown</div>
      ${fld('nc','CASH')}${fld('nn','NETS')}${fld('np','PayNow')}
      ${trow('Total Sales','nts')}
      <div class="sl">Adjustments</div>
      ${fld('nsh','Shortage','neg')}${fld('nex','Extra')}
      ${trow('Total Sales (Net)','nnet')}
      ${fld('nbo','Handover to Boss')}${fld('nfl','Float Cash')}`;
  } else if(shop==='kaki_mm'){
    inn=posBlk('p1','POS 1 Sales')+posBlk('p2','POS 2 Sales')+trow('Total Day Sales','day_tot','dt');
  } else if(shop==='tuas_mm'){
    inn=posBlk('p1','POS 1 Sales')+posBlk('p2','POS 2 Sales')+posBlk('p3','POS 3 Sales')+trow('Total Day Sales','day_tot','dt');
  }

  area.innerHTML=`<div class="card">
    <div class="ch"><h2>${NAMES[shop]}</h2><span class="badge">Daily Entry</span></div>
    <div class="cb">
      ${inn}
      <div class="btn-grid" style="margin-top:14px;">
        <button class="sbtn" onclick="saveRpt()">💾 Save</button>
        <button class="pbtn" onclick="togglePv()">👁 Preview & Share</button>
      </div>
      <div id="pvBox" class="pvbox"></div>
      <div class="share-row hidden" id="shareRow">
        <button class="cpbtn" onclick="copyRpt()">📋 Copy Text</button>
        <button class="wabtn" onclick="waRpt()">${waIcon()} WhatsApp</button>
      </div>
    </div>
  </div>`;
  calc();
}

function waIcon(){
  return `<svg width="18" height="18" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="16" fill="rgba(255,255,255,0.25)"/><path d="M22.5 9.5A8.9 8.9 0 0 0 16 7a8.95 8.95 0 0 0-7.76 13.41L7 25l4.72-1.24A8.94 8.94 0 0 0 16 24.9a8.95 8.95 0 0 0 6.5-15.4zm-6.5 13.75a7.43 7.43 0 0 1-3.78-1.03l-.27-.16-2.8.73.75-2.73-.18-.28A7.45 7.45 0 1 1 16 23.25zm4.09-5.57c-.22-.11-1.32-.65-1.53-.72-.2-.08-.35-.11-.5.11-.15.22-.58.72-.71.87-.13.15-.26.17-.49.06-.22-.11-.94-.35-1.79-1.1-.66-.59-1.1-1.31-1.23-1.53-.13-.22-.01-.34.1-.45.1-.1.22-.26.33-.39.11-.13.15-.22.22-.37.08-.15.04-.28-.02-.39-.06-.11-.5-1.2-.68-1.65-.18-.43-.36-.37-.5-.38h-.43c-.15 0-.39.06-.59.28-.2.22-.78.76-.78 1.86s.8 2.16.91 2.31c.11.15 1.57 2.4 3.81 3.36.53.23.95.37 1.27.47.53.17 1.02.14 1.4.09.43-.06 1.32-.54 1.5-1.06.19-.52.19-.96.13-1.06-.06-.1-.2-.16-.43-.27z" fill="#fff"/></svg>`;
}

function calc(){
  if(!shop)return;
  if(shop==='muri'){
    const ts=v('cash')+v('coins')+v('nets')+v('paynow');
    setEl('ts',ts);setEl('gt',ts-v('exp'));
  } else if(shop==='jp_canteen'||shop==='neythal_canteen'){
    const p=shop==='jp_canteen'?'jp':'nc';
    const ct=v(p+'_cc')+v(p+'_cn')+v(p+'_cp'),cg=ct-v(p+'_ce');
    const kt=v(p+'_kc')+v(p+'_kn')+v(p+'_kp'),kg=kt-v(p+'_ke');
    setEl(p+'_ct',ct);setEl(p+'_cg',cg);setEl(p+'_kt',kt);setEl(p+'_kg',kg);setEl(p+'_grand',cg+kg);
  } else if(shop==='neythal_mm'){
    const ts=v('nc')+v('nn')+v('np');
    setEl('nts',ts);setEl('nnet',ts-v('nsh')+v('nex'));
  } else if(shop==='kaki_mm'){
    let d=0;['p1','p2'].forEach(p=>{const ts=v(p+'_cash')+v(p+'_nets')+v(p+'_paynow');setEl(p+'_total',ts);setEl(p+'_net',ts-v(p+'_short')+v(p+'_extra'));d+=ts;});setEl('day_tot',d);
  } else if(shop==='tuas_mm'){
    let d=0;['p1','p2','p3'].forEach(p=>{const ts=v(p+'_cash')+v(p+'_nets')+v(p+'_paynow');setEl(p+'_total',ts);setEl(p+'_net',ts-v(p+'_short')+v(p+'_extra'));d+=ts;});setEl('day_tot',d);
  }
  const pb=document.getElementById('pvBox');
  if(pb&&pb.style.display==='block')pb.textContent=buildText(shop).txt;
}

function buildText(s){
  const n=new Date();
  const ds=`${pad(n.getDate())}/${pad(n.getMonth()+1)}/${n.getFullYear()}`;
  const ts=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
  const ln='━'.repeat(30);
  let t=`🌶️ *786 SPICES GROUP*\n📋 Daily Sales Report\n${ln}\n🏪 ${NAMES[s]}\n📅 ${ds}  🕐 ${ts}\n${ln}\n`;
  let grand=0;

  if(s==='muri'){
    const tot=v('cash')+v('coins')+v('nets')+v('paynow');
    grand=tot-v('exp');
    t+=`💵 Cash          : ${fmt(v('cash'))}\n🪙 Coins         : ${fmt(v('coins'))}\n💳 NETS          : ${fmt(v('nets'))}\n📱 PayNow        : ${fmt(v('paynow'))}\n${ln}\n📊 Total Sales   : ${fmt(tot)}\n➖ Expenses      : ${fmt(v('exp'))}\n${ln}\n✅ *GRAND TOTAL  : ${fmt(grand)}*\n`;
  } else if(s==='jp_canteen'||s==='neythal_canteen'){
    const p=s==='jp_canteen'?'jp':'nc';
    const ct=v(p+'_cc')+v(p+'_cn')+v(p+'_cp'),cg=ct-v(p+'_ce');
    const kt=v(p+'_kc')+v(p+'_kn')+v(p+'_kp'),kg=kt-v(p+'_ke');
    grand=cg+kg;
    t+=`🍽️ *CANTEEN SALES*\n💵 Cash    : ${fmt(v(p+'_cc'))}\n💳 NETS    : ${fmt(v(p+'_cn'))}\n📱 PayNow  : ${fmt(v(p+'_cp'))}\n📊 Total   : ${fmt(ct)}\n➖ Expenses: ${fmt(v(p+'_ce'))}\n✅ Grand   : ${fmt(cg)}\n${ln}\n🎪 *CATERING SALES*\n💵 Cash    : ${fmt(v(p+'_kc'))}\n💳 NETS    : ${fmt(v(p+'_kn'))}\n📱 PayNow  : ${fmt(v(p+'_kp'))}\n📊 Total   : ${fmt(kt)}\n➖ Expenses: ${fmt(v(p+'_ke'))}\n✅ Grand   : ${fmt(kg)}\n${ln}\n🏆 *GRAND TOTAL  : ${fmt(grand)}*\n`;
  } else if(s==='neythal_mm'){
    const tot=v('nc')+v('nn')+v('np');
    const net=tot-v('nsh')+v('nex');
    grand=tot;
    t+=`💵 Cash          : ${fmt(v('nc'))}\n💳 NETS          : ${fmt(v('nn'))}\n📱 PayNow        : ${fmt(v('np'))}\n📊 Total Sales   : ${fmt(tot)}\n${ln}\n❌ Shortage      : ${fmt(v('nsh'))}\n➕ Extra         : ${fmt(v('nex'))}\n✅ Net Total     : ${fmt(net)}\n${ln}\n👔 Boss Handover : ${fmt(v('nbo'))}\n💰 Float Cash    : ${fmt(v('nfl'))}\n`;
  } else if(s==='kaki_mm'){
    let d=0;
    ['p1','p2'].forEach((p,i)=>{
      const tot=v(p+'_cash')+v(p+'_nets')+v(p+'_paynow'),net=tot-v(p+'_short')+v(p+'_extra');d+=tot;
      t+=`🖥️ *POS ${i+1}*\n💵 Cash    : ${fmt(v(p+'_cash'))}\n💳 NETS    : ${fmt(v(p+'_nets'))}\n📱 PayNow  : ${fmt(v(p+'_paynow'))}\n📊 Total   : ${fmt(tot)}\n❌ Shortage: ${fmt(v(p+'_short'))}\n➕ Extra   : ${fmt(v(p+'_extra'))}\n✅ Net     : ${fmt(net)}\n👔 Boss    : ${fmt(v(p+'_boss'))}\n💰 Float   : ${fmt(v(p+'_float'))}\n${ln}\n`;
    });
    grand=d;t+=`🏆 *TOTAL DAY SALES: ${fmt(d)}*\n`;
  } else if(s==='tuas_mm'){
    let d=0;
    ['p1','p2','p3'].forEach((p,i)=>{
      const tot=v(p+'_cash')+v(p+'_nets')+v(p+'_paynow'),net=tot-v(p+'_short')+v(p+'_extra');d+=tot;
      t+=`🖥️ *POS ${i+1}*\n💵 Cash    : ${fmt(v(p+'_cash'))}\n💳 NETS    : ${fmt(v(p+'_nets'))}\n📱 PayNow  : ${fmt(v(p+'_paynow'))}\n📊 Total   : ${fmt(tot)}\n❌ Shortage: ${fmt(v(p+'_short'))}\n➕ Extra   : ${fmt(v(p+'_extra'))}\n✅ Net     : ${fmt(net)}\n👔 Boss    : ${fmt(v(p+'_boss'))}\n💰 Float   : ${fmt(v(p+'_float'))}\n${ln}\n`;
    });
    grand=d;t+=`🏆 *TOTAL DAY SALES: ${fmt(d)}*\n`;
  }
  t+=`${ln}\n_Submitted via 786 Spices Sales App_`;
  return {txt:t,grand};
}

function togglePv(){
  const pb=document.getElementById('pvBox'),sr=document.getElementById('shareRow');
  if(!pb)return;
  const open=pb.style.display==='block';
  pb.style.display=open?'none':'block';
  sr.classList.toggle('hidden',open);
  if(!open)pb.textContent=buildText(shop).txt;
}

function doCopy(txt){
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('✅ Copied to clipboard!'));}
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ Copied to clipboard!');}
}
function copyRpt(){doCopy(buildText(shop).txt);}
function waRpt(){window.open('https://wa.me/?text='+encodeURIComponent(buildText(shop).txt),'_blank');}

function saveRpt(){
  if(!shop)return;
  const n=new Date(),{txt,grand}=buildText(shop);
  const KEY='786_reports',arr=JSON.parse(localStorage.getItem(KEY)||'[]');
  arr.unshift({id:Date.now(),shop,name:NAMES[shop],date:`${pad(n.getDate())}/${pad(n.getMonth()+1)}/${n.getFullYear()}`,time:`${pad(n.getHours())}:${pad(n.getMinutes())}`,grand,txt});
  localStorage.setItem(KEY,JSON.stringify(arr));
  renderSaved();toast('✅ Report saved!');
}

function renderSaved(){
  const KEY='786_reports',arr=JSON.parse(localStorage.getItem(KEY)||'[]');
  document.getElementById('saveCnt').textContent=`${arr.length} entr${arr.length===1?'y':'ies'}`;
  const list=document.getElementById('saveList');
  if(!arr.length){list.innerHTML='<div class="empty"><div class="ico">📋</div>No reports saved yet.</div>';return;}
  list.innerHTML=arr.map(r=>`
    <div class="sr">
      <div class="sr-top">
        <div><div class="sr-shop">${r.name}</div><div class="sr-date">${r.date} at ${r.time}</div></div>
        <div class="sr-right">
          <div class="sr-tot">${fmt(r.grand)}</div>
          <div class="sr-acts">
            <button class="sr-cp" onclick="doCopy(getSaved(${r.id}).txt)">📋</button>
            <button class="sr-wa" onclick="waOld(${r.id})">${waIcon()} WA</button>
            <button class="delbtn" onclick="delRpt(${r.id})">✕</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function getSaved(id){return JSON.parse(localStorage.getItem('786_reports')||'[]').find(r=>r.id===id)||{};}
function waOld(id){const r=getSaved(id);if(r.txt)window.open('https://wa.me/?text='+encodeURIComponent(r.txt),'_blank');}
function delRpt(id){
  const KEY='786_reports',arr=JSON.parse(localStorage.getItem(KEY)||'[]').filter(r=>r.id!==id);
  localStorage.setItem(KEY,JSON.stringify(arr));renderSaved();toast('🗑️ Deleted');
}

renderSaved();
</script>
